<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Vida Control Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #004085;
            --dark: #001a33;
            --light: #f0f4f8;
            --green: #28a745;
            --gray: #6c757d;
            --red: #dc3545;
            --gold: #d4af37;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { height: 100%; }
        html { background: var(--dark); }
        body { background: var(--dark); font-family: 'DM Sans', system-ui, sans-serif; color: var(--dark); }
        
        /* ✅ FIXED: Ensures consistent background color for the app content */
        body.unlocked { background: var(--light) !important; }

        /* ── LOGIN ── */
        #loginPage {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--dark);
            display: table;
            width: 100%;
            height: 100%;
            z-index: 100;
        }
        #loginInner {
            display: table-cell;
            vertical-align: middle;
            text-align: center;
            padding: 24px;
        }
        .login-card {
            background: white;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            padding: 40px 24px 28px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .login-logo {
            font-family: 'Syne', sans-serif; font-size: 2.2rem;
            letter-spacing: 8px; color: var(--dark); margin-bottom: 6px;
        }
        .login-sub { color: var(--gray); font-size: 0.75rem; margin-bottom: 28px; }
        .pass-input {
            width: 100%; padding: 15px; border: 2px solid #dde3ea;
            border-radius: 14px; font-size: 1.4rem; text-align: center;
            letter-spacing: 10px; background: #f8fafc; outline: none;
            font-family: 'DM Sans', sans-serif; margin-bottom: 16px;
            -webkit-appearance: none; appearance: none; display: block;
            transition: border-color 0.2s;
        }
        .pass-input:focus { border-color: var(--blue); background: white; }
        #pinError { color: var(--red); font-size: 0.78rem; min-height: 18px; margin-top: 8px; }

        /* ── MAIN APP ── */
        #mainApp { display: none; }

        /* ── STICKY HEADER ── */
        .header {
            background: var(--dark); color: white;
            padding: 14px 16px 16px;
            border-bottom: 4px solid var(--gold);
            position: sticky; top: 0; z-index: 500;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
        }
        .header-top {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 12px;
        }
        .header-logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.3rem; letter-spacing: 4px; color: var(--gold);
        }
        .header-date { font-size: 0.65rem; color: rgba(255,255,255,0.5); text-align: right; }

        .today-panel {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 12px; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 14px; padding: 12px;
        }
        .today-stat h4 {
            font-size: 0.55rem; color: var(--gold);
            text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px;
        }
        .today-stat p { font-size: 0.9rem; font-weight: 700; color: white; }
        .hero-trend { font-size: 0.65rem; font-weight: 700; margin-top: 2px; display: block; }
        .stat-up { color: #4ade80; }
        .stat-down { color: #f87171; }

        /* ── CONTAINER ── */
        .container { padding: 16px; max-width: 480px; margin: auto; }

        .primary-cta {
            background: var(--blue); color: white; width: 100%;
            padding: 17px; border: none; border-radius: 16px;
            font-size: 1rem; font-weight: 800; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-bottom: 16px;
            box-shadow: 0 8px 20px rgba(0,64,133,0.3);
            font-family: 'DM Sans', sans-serif; letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .summary-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; margin-bottom: 16px;
        }
        .stat-card {
            background: white; padding: 14px; border-radius: 16px;
            border-left: 4px solid var(--blue);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .stat-card h4 { font-size: 0.58rem; color: var(--gray); text-transform: uppercase; margin-bottom: 6px; }
        .stat-card p { font-size: 0.88rem; font-weight: 700; }

        .btn-sec {
            flex: 1; padding: 12px; border-radius: 12px;
            border: 1px solid #dde3ea; background: white;
            font-weight: 700; cursor: pointer;
            font-size: 0.75rem; font-family: 'DM Sans', sans-serif;
        }

        .section-label {
            font-size: 0.65rem; font-weight: 700; color: var(--gray);
            text-transform: uppercase; letter-spacing: 1px;
            display: block; margin-bottom: 10px;
        }
        .entry-item {
            background: white; padding: 14px 14px 14px 16px;
            border-radius: 16px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid #e0e6ef;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }
        .entry-item.is-today { border-left-color: var(--gold); background: #fffdf5; }
        .entry-date { font-size: 0.88rem; font-weight: 700; }
        .entry-meta { font-size: 0.72rem; color: var(--gray); margin-top: 3px; }
        
        .sales-trend {
            display: inline-block; font-size: 0.68rem; font-weight: 700;
            margin-top: 4px; padding: 2px 7px; border-radius: 6px;
        }

        .tag-today {
            display: inline-block; background: var(--gold); color: var(--dark);
            font-size: 0.45rem; padding: 2px 6px; border-radius: 4px;
            font-weight: 900; margin-left: 6px; vertical-align: middle;
            letter-spacing: 0.5px;
        }

        .action-btns { display: flex; gap: 8px; }
        .btn-circle {
            border: none; background: #f0f3f6;
            width: 38px; height: 38px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.55); z-index: 1500;
            backdrop-filter: blur(3px); justify-content: center; align-items: flex-end;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white; width: 100%; max-width: 480px;
            border-radius: 28px 28px 0 0; padding: 24px 20px 36px;
        }

        .loading-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,26,51,0.8); z-index: 9999;
            justify-content: center; align-items: center;
            flex-direction: column; color: white;
        }
        .spinner {
            width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.2);
            border-top-color: var(--gold); border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--dark); color: white; padding: 12px 24px;
            border-radius: 12px; font-size: 0.82rem; z-index: 9998; opacity: 0; transition: 0.3s;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body onload="checkSession()">

<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
    <div style="margin-top:10px; font-size:0.8rem;">SYNCING...</div>
</div>

<div id="toast" class="toast"></div>

<!-- LOGIN PAGE -->
<div id="loginPage">
    <div id="loginInner">
        <div class="login-card">
            <div class="login-logo">LA VIDA</div>
            <div class="login-sub">Authorized Access Only</div>
            <input type="password" id="passInput" inputmode="numeric" class="pass-input" placeholder="••••••" onkeypress="if(event.key==='Enter') checkLogin()">
            <button class="primary-cta" style="margin-bottom:0;" onclick="checkLogin()">UNLOCK</button>
            <div id="pinError" style="color:var(--red); font-size:0.8rem; margin-top:10px;"></div>
        </div>
    </div>
</div>

<!-- MAIN APP -->
<div id="mainApp">
    <div class="header">
        <div class="header-top">
            <div class="header-logo">LA VIDA</div>
            <div id="headerDate" class="header-date"></div>
        </div>
        <div class="today-panel">
            <div class="today-stat">
                <h4>Today Sales</h4>
                <p id="daySales">—</p>
                <span id="dayTrend" class="hero-trend"></span>
            </div>
            <div class="today-stat" style="text-align: right;">
                <h4>All Balance</h4>
                <p id="topBalance" style="color:var(--gold)">—</p>
                <span id="balTrend" class="hero-trend"></span>
            </div>
        </div>
    </div>

    <div class="container">
        <button class="primary-cta" onclick="openModal('entry')" style="margin-top:14px;">➕ ADD DAILY ENTRY</button>
        
        <div class="summary-grid">
            <div class="stat-card"><h4>Total Sales</h4><p id="totalSales">...</p></div>
            <div class="stat-card"><h4>Stocking</h4><p id="totalStock">...</p></div>
            <div class="stat-card"><h4>Other Exp</h4><p id="totalOther">...</p></div>
            <div class="stat-card"><h4>Savings</h4><p id="totalSavings">...</p></div>
        </div>

        <div style="display:flex; gap:10px; margin-bottom:18px;">
            <button class="btn-sec" onclick="openModal('search')">🔍 FIND DATE</button>
            <button class="btn-sec" onclick="openModal('report')">📄 REPORTS</button>
        </div>

        <span class="section-label">Transaction History</span>
        <div id="entryList"></div>
        <button id="loadMoreBtn" class="btn-sec" style="width:100%; margin-top:4px; display:none;" onclick="loadMore()">VIEW MORE</button>
    </div>
</div>

<!-- MODAL ENTRY -->
<div class="modal-overlay" id="overlayEntry">
    <div class="modal">
        <div id="formTitle" style="text-align:center; font-weight:bold; margin-bottom:20px;">New Entry</div>
        <input type="date" id="date" style="width:100%; margin-bottom:12px; padding:12px; border:1px solid #ddd; border-radius:8px;">
        <input type="number" id="sales" placeholder="Sales (TZS)" style="width:100%; margin-bottom:12px; padding:12px; border:1px solid #ddd; border-radius:8px;">
        <input type="number" id="stock" placeholder="Stocking (TZS)" style="width:100%; margin-bottom:12px; padding:12px; border:1px solid #ddd; border-radius:8px;">
        <input type="number" id="other" placeholder="Other Exp (TZS)" style="width:100%; margin-bottom:12px; padding:12px; border:1px solid #ddd; border-radius:8px;">
        <input type="number" id="savings" placeholder="Savings (TZS)" style="width:100%; margin-bottom:12px; padding:12px; border:1px solid #ddd; border-radius:8px;">
        <textarea id="note" placeholder="Note" style="width:100%; margin-bottom:12px; padding:12px; border:1px solid #ddd; border-radius:8px; height:60px;"></textarea>
        <button class="primary-cta" onclick="saveRecord()">SAVE RECORD</button>
        <button onclick="closeModals()" style="width:100%; border:none; background:none; margin-top:10px; color:var(--gray);">CANCEL</button>
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzDqLcc9kqXA8sH1cfdZ17asFXBXfZ8mwVpXXiPeZV-uesUw_KlIfquwZJsx2Q7pq00/exec";
const PIN = "112511";
let data = [];
let displayLimit = 5;

// ✅ NEW: Persistent Login Check
function checkSession() {
    if (sessionStorage.getItem('lv_auth') === 'true') {
        unlockApp();
    }
}

function checkLogin() {
    if (document.getElementById('passInput').value === PIN) {
        sessionStorage.setItem('lv_auth', 'true');
        unlockApp();
    } else {
        document.getElementById('pinError').innerText = "Wrong PIN";
        setTimeout(() => document.getElementById('pinError').innerText = '', 2000);
    }
}

function unlockApp() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.body.classList.add('unlocked');
    document.getElementById('headerDate').innerText = new Date().toLocaleDateString('en-TZ', { weekday:'short', day:'numeric', month:'short' });
    fetchData();
}

async function fetchData() {
    document.getElementById('loadingOverlay').style.display = 'flex';
    try {
        const res = await fetch(SCRIPT_URL + '?t=' + Date.now());
        data = await res.json();
        render();
    } catch (e) { showToast("Sync failed"); }
    document.getElementById('loadingOverlay').style.display = 'none';
}

function render() {
    const list = document.getElementById('entryList');
    list.innerHTML = '';
    const todayStr = new Date().toLocaleDateString('sv-SE');
    
    data.sort((a, b) => new Date(a.date) - new Date(b.date));

    let totalSales = 0, totalExp = 0, runningBal = 0, prevBal = 0;
    let todaySales = 0, yesterdaySales = 0;

    data.forEach((row, i) => {
        const s = Number(row.sales) || 0;
        const e = (Number(row.stocking)||0) + (Number(row.other)||0) + (Number(row.savings)||0);
        
        prevBal = runningBal; // Capture balance before this entry
        totalSales += s;
        totalExp += e;
        runningBal = totalSales - totalExp;

        const rowDate = (row.date || '').split('T')[0];
        if (rowDate === todayStr) todaySales = s;
        
        const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
        if (rowDate === yesterday.toLocaleDateString('sv-SE')) yesterdaySales = s;
    });

    // Update Hero Stats
    document.getElementById('daySales').innerText = todaySales.toLocaleString() + " TZS";
    document.getElementById('topBalance').innerText = runningBal.toLocaleString() + " TZS";

    // ✅ Percentage Logic: Today Sales vs Yesterday
    if (yesterdaySales > 0) {
        const diff = ((todaySales - yesterdaySales) / yesterdaySales) * 100;
        const el = document.getElementById('dayTrend');
        el.className = diff >= 0 ? 'hero-trend stat-up' : 'hero-trend stat-down';
        el.innerText = (diff >= 0 ? '↑ ' : '↓ ') + Math.abs(diff).toFixed(0) + "% vs yesterday";
    }

    // ✅ Percentage Logic: All Balance Change
    if (prevBal !== 0) {
        const bDiff = ((runningBal - prevBal) / Math.abs(prevBal)) * 100;
        const bEl = document.getElementById('balTrend');
        bEl.className = bDiff >= 0 ? 'hero-trend stat-up' : 'hero-trend stat-down';
        bEl.innerText = (bDiff >= 0 ? '↑ ' : '↓ ') + Math.abs(bDiff).toFixed(0) + "% change";
    }

    // Summary Cards
    document.getElementById('totalSales').innerText = totalSales.toLocaleString() + " TZS";
    document.getElementById('totalStock').innerText = totalExp.toLocaleString() + " TZS"; // Summed for summary

    // History List
    const sorted = [...data].reverse();
    sorted.slice(0, displayLimit).forEach(row => {
        const rowDate = row.date.split('T')[0];
        const isToday = rowDate === todayStr;
        const div = document.createElement('div');
        div.className = 'entry-item' + (isToday ? ' is-today' : '');
        div.innerHTML = `
            <div style="flex:1;">
                <div class="entry-date">${rowDate}${isToday ? '<span class="tag-today">TODAY</span>' : ''}</div>
                <div class="entry-meta">Sales: ${Number(row.sales).toLocaleString()} | Exp: ${(Number(row.stocking)+Number(row.other)).toLocaleString()}</div>
            </div>
            <div class="action-btns">
                <button class="btn-circle" onclick="deleteRow('${rowDate}')">🗑️</button>
            </div>`;
        list.appendChild(div);
    });
    document.getElementById('loadMoreBtn').style.display = data.length > displayLimit ? 'block' : 'none';
}

function loadMore() { displayLimit += 5; render(); }
function openModal() { document.getElementById('overlayEntry').classList.add('active'); document.getElementById('date').value = new Date().toLocaleDateString('sv-SE'); }
function closeModals() { document.getElementById('overlayEntry').classList.remove('active'); }

async function saveRecord() {
    const record = {
        date: document.getElementById('date').value,
        sales: document.getElementById('sales').value,
        stocking: document.getElementById('stock').value,
        other: document.getElementById('other').value,
        savings: document.getElementById('savings').value,
        note: document.getElementById('note').value
    };
    closeModals();
    document.getElementById('loadingOverlay').style.display = 'flex';
    await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(record) });
    setTimeout(fetchData, 1500);
}

async function deleteRow(d) {
    if(!confirm("Delete?")) return;
    document.getElementById('loadingOverlay').style.display = 'flex';
    await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "delete", date: d }) });
    setTimeout(fetchData, 1500);
}

function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2500); }
</script>
</body>
</html>
