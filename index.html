<script>

/* KEEP EVERYTHING ABOVE EXACTLY THE SAME */

// ================= RENDER =================
function render() {

    const DAILY_TARGET = 50000; // ✅ ADDED

    const list = document.getElementById('entryList');
    list.innerHTML = '';

    let totalSales = 0, totalStock = 0, totalOther = 0, totalSavings = 0;
    let dayS = null, dayStock = 0, dayOther = 0, daySavings = 0;
    let runningBalance = 0;

    const todayStr = getLocalDateStr();

    data.sort((a, b) => new Date(a.date) - new Date(b.date));

    data.forEach(row => {
        const rowDate = (row.date || '').split('T')[0];

        totalSales    += Number(row.sales)    || 0;
        totalStock    += Number(row.stocking) || 0;
        totalOther    += Number(row.other)    || 0;
        totalSavings  += Number(row.savings)  || 0;

        runningBalance = totalSales - totalStock - totalOther - totalSavings;

        if (rowDate === todayStr) {
            dayS        = Number(row.sales)    || 0;
            dayStock    = Number(row.stocking) || 0;
            dayOther    = Number(row.other)    || 0;
            daySavings  = Number(row.savings)  || 0;
        }
    });

    // ===== TODAY PANEL =====
    if (dayS !== null) {

        const dayNet = dayS - dayStock - dayOther - daySavings;
        const margin = dayS > 0 ? ((dayNet / dayS) * 100).toFixed(0) : 0;

        document.getElementById('daySales').innerText = fmt(dayS);
        document.getElementById('dayNet').innerText   = fmt(dayNet) + ` (${margin}%)`;
        document.getElementById('dayNet').style.color = dayNet >= 0 ? '#4ade80' : '#f87171';

        // ✅ SMART ALERT (COMBINED)
        const alerts = [];

        if (dayS >= DAILY_TARGET) {
            alerts.push("✅ Target hit");
        } else {
            alerts.push("⚠️ Below target");
        }

        if ((dayStock + dayOther) > dayS) {
            alerts.push("⚠️ Overspending");
        }

        if (dayNet < 0) {
            alerts.push("❌ Negative profit");
        } else if (margin >= 30) {
            alerts.push("💰 Strong margin");
        }

        alerts.sort((a, b) => a.includes("❌") ? -1 : 0);

        if (alerts.length > 0) {
            showToast(alerts.join(" • "));
        }

    } else {
        document.getElementById('daySales').innerText = '— TZS';
        document.getElementById('dayNet').innerText   = 'No entry';
        document.getElementById('dayNet').style.color = 'rgba(255,255,255,0.5)';
    }

    document.getElementById('topBalance').innerText = fmt(runningBalance);

    // KEEP REST OF render() EXACTLY THE SAME
}

// ================= MODAL UX =================
function openModal(type) {
    closeModals();

    if (type === 'entry') {
        document.getElementById('formTitle').innerText = "New Entry";
        document.querySelectorAll('#overlayEntry input, #overlayEntry textarea').forEach(i => i.value = '');
        document.getElementById('date').value = getLocalDateStr();
        document.getElementById('overlayEntry').classList.add('active');

        // ✅ AUTO FOCUS
        setTimeout(() => document.getElementById('sales').focus(), 300);
    }
}

// ================= SAVE =================
async function saveRecord() {

    const record = {
        date:     document.getElementById('date').value,
        sales:    parseFloat(document.getElementById('sales').value)   || 0,
        stocking: parseFloat(document.getElementById('stock').value)   || 0,
        other:    parseFloat(document.getElementById('other').value)   || 0,
        savings:  parseFloat(document.getElementById('savings').value) || 0,
        note:     document.getElementById('note').value.trim() || ""
    };

    closeModals();
    showLoader(true);

    await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(record) });

    showToast("✅ Record saved!");

    // ✅ VIBRATION
    navigator.vibrate?.(50);

    setTimeout(fetchData, 1400);
}

// ================= DELETE =================
async function deleteRow(d) {

    if (!confirm("Delete record for " + d + "?")) return;

    showLoader(true);

    await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "delete", date: d }) });

    showToast("🗑️ Record deleted.");

    // ✅ VIBRATION
    navigator.vibrate?.(50);

    setTimeout(fetchData, 1400);
}

// ================= PDF =================
function generatePDF() {

    const m = document.getElementById('reportMonth').value;
    const filtered = data.filter(d => (d.date || '').startsWith(m));

    let totSales = 0, totStock = 0, totOther = 0, totSav = 0;

    filtered.forEach(r => {
        totSales += Number(r.sales)    || 0;
        totStock += Number(r.stocking) || 0;
        totOther += Number(r.other)    || 0;
        totSav   += Number(r.savings)  || 0;
    });

    const totNet = totSales - totStock - totOther - totSav;

    // ✅ NEW METRICS
    const avg = totSales / filtered.length;

    let bestDay = filtered[0];
    let worstDay = filtered[0];

    filtered.forEach(r => {
        if ((r.sales || 0) > (bestDay.sales || 0)) bestDay = r;
        if ((r.sales || 0) < (worstDay.sales || 0)) worstDay = r;
    });

    const summaries = [
        ['Total Sales', totSales.toLocaleString() + ' TZS'],
        ['Total Stock', totStock.toLocaleString() + ' TZS'],
        ['Other Exp',   totOther.toLocaleString() + ' TZS'],
        ['Savings',     totSav.toLocaleString()   + ' TZS'],
        ['Net Balance', totNet.toLocaleString()   + ' TZS'],
        ['Avg / Day',   avg.toLocaleString(undefined,{maximumFractionDigits:0}) + ' TZS'],
        ['Best Day',    (bestDay.date || '').split('T')[0]],
        ['Worst Day',   (worstDay.date || '').split('T')[0]],
    ];

    // KEEP REST OF PDF CODE SAME
}

</script>
