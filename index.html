<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Vida Minimart</title>
    <style>
        :root { --blue: #004085; --dark: #001a33; --light: #f8fbff; --green: #28a745; --gray: #6c757d; --red: #dc3545; --gold: #d4af37; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; margin: 0; padding: 0; }
        .brand-header { background: var(--dark); color: white; padding: 25px 10px; text-align: center; border-bottom: 6px solid var(--blue); }
        .brand-header h1 { margin: 0; font-size: 2rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 900; }
        #loginPage { display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--dark); padding: 20px; }
        .login-card { background: white; width: 100%; max-width: 350px; padding: 40px 20px; border-radius: 20px; text-align: center; }
        #mainApp { display: none; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        
        /* Summary Grid */
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: white; padding: 12px; border-radius: 12px; border-left: 4px solid var(--blue); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stat-card h4 { margin: 0; font-size: 0.6rem; color: var(--gray); text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0; font-size: 0.85rem; font-weight: bold; color: var(--dark); }
        .full-width-card { grid-column: span 2; border-left-color: var(--green); background: #fafffa; }

        /* Navigation Menu */
        .nav-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .nav-btn { height: 80px; border: none; border-radius: 15px; font-weight: bold; font-size: 0.85rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-new { background: var(--blue); color: white; }
        .btn-goto { background: white; color: var(--blue); border: 2px solid var(--blue); }
        .nav-btn span { font-size: 1.5rem; margin-bottom: 5px; }

        /* Pop-up Cards */
        .card-box { display: none; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 5px solid var(--blue); }
        .field-group { margin-bottom: 12px; }
        .field-label { font-size: 0.65rem; font-weight: 800; color: var(--blue); text-transform: uppercase; margin-bottom: 4px; display: block; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; background: #fafafa; }
        .btn-save { width: 100%; background: var(--blue); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .btn-close { width: 100%; background: #eee; color: #555; border: none; padding: 10px; border-radius: 10px; margin-top: 10px; cursor: pointer; font-weight: bold; }

        /* History Items */
        .entry-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--blue); }
        .entry-actions { display: flex; gap: 5px; }
        .action-icon { border: none; background: #f0f2f5; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        
        .load-more-btn { width: 100%; padding: 12px; background: none; border: 2px dashed var(--gray); color: var(--gray); border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .loading { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; justify-content:center; align-items:center; }
    </style>
</head>
<body>

<div id="loading" class="loading"><b>🔄 Updating La Vida...</b></div>

<div id="loginPage">
    <div class="login-card">
        <h1>LA VIDA</h1>
        <input type="password" id="passInput" placeholder="Passcode" style="text-align:center; letter-spacing: 5px; margin-bottom:10px;">
        <button class="btn-save" onclick="checkLogin()">UNLOCK</button>
    </div>
</div>

<div id="mainApp">
    <div class="brand-header"><h1>La Vida Minimart</h1></div>

    <div class="container">
        <div class="summary-grid">
            <div class="stat-card"><h4>Sales</h4><p id="totalSales">0</p></div>
            <div class="stat-card"><h4>Stock</h4><p id="totalStock">0</p></div>
            <div class="stat-card"><h4>Other</h4><p id="totalOther">0</p></div>
            <div class="stat-card"><h4>Savings</h4><p id="totalSavings">0</p></div>
            <div class="stat-card full-width-card"><h4>Balance</h4><p id="balance">0</p></div>
        </div>

        <div class="nav-menu">
            <button class="nav-btn btn-new" onclick="openNewEntry()"><span>➕</span> NEW ENTRY</button>
            <button class="nav-btn btn-goto" onclick="toggleCard('searchCard')"><span>📅</span> GO TO DATE</button>
        </div>

        <div id="searchCard" class="card-box">
            <span class="field-label" style="font-size:0.8rem; margin-bottom:10px;">Find Date to Edit</span>
            <div style="display:flex; gap:10px;">
                <input type="date" id="searchDate">
                <button onclick="searchByDate()" style="background:var(--blue); color:white; border:none; padding:0 15px; border-radius:10px;">🔍</button>
            </div>
            <button class="btn-close" onclick="toggleCard('searchCard')">CLOSE</button>
        </div>

        <div id="entryFormCard" class="card-box">
            <span class="field-label" id="formTitle" style="font-size: 0.8rem; margin-bottom: 15px;">Add Daily Record</span>
            <div class="field-group"><span class="field-label">📅 Date</span><input type="date" id="date"></div>
            <div class="field-group"><span class="field-label">💰 Sales (TZS)</span><input type="number" id="sales"></div>
            <div class="field-group"><span class="field-label">📦 Stocking (TZS)</span><input type="number" id="stock"></div>
            <div class="field-group"><span class="field-label">💸 Other Expenses (TZS)</span><input type="number" id="other"></div>
            <div class="field-group"><span class="field-label">🏦 Savings (TZS)</span><input type="number" id="savings"></div>
            <button class="btn-save" onclick="addRecord()">SAVE RECORD</button>
            <button class="btn-close" onclick="toggleCard('entryFormCard')">CANCEL</button>
        </div>

        <label style="margin-bottom: 10px; display: block; font-size: 0.7rem; font-weight: bold; color: var(--gray);">📑 TRANSACTION HISTORY</label>
        <div id="entryList"></div>
        <button id="loadMoreBtn" class="load-more-btn" onclick="loadMore()">VIEW MORE ENTRIES</button>

        <br><hr style="opacity: 0.2;"><br>
        
        <div style="background:white; padding:15px; border-radius:15px; border: 1px solid #ddd;">
            <span class="field-label">📅 Export Monthly Report</span>
            <input type="month" id="reportMonth" style="margin-top:5px; margin-bottom:10px;">
            <button class="btn-save" style="padding:10px; font-size:0.8rem;" onclick="generatePDF()">DOWNLOAD PDF</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzDqLcc9kqXA8sH1cfdZ17asFXBXfZ8mwVpXXiPeZV-uesUw_KlIfquwZJsx2Q7pq00/exec";
let data = [];
let displayLimit = 5;

function checkLogin() {
    if (document.getElementById('passInput').value === "112511") {
        sessionStorage.setItem('la_vida_session', 'active');
        showApp();
    } else { alert("Incorrect Passcode"); }
}

function showApp() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    fetchFromCloud();
}

function toggleCard(cardId) {
    const card = document.getElementById(cardId);
    const isVisible = card.style.display === 'block';
    document.getElementById('entryFormCard').style.display = 'none';
    document.getElementById('searchCard').style.display = 'none';
    if (!isVisible) card.style.display = 'block';
}

function openNewEntry() {
    document.getElementById('formTitle').innerText = "Add Daily Record";
    document.querySelectorAll('#entryFormCard input').forEach(i => i.value = '');
    toggleCard('entryFormCard');
}

async function fetchFromCloud() {
    document.getElementById('loading').style.display = 'flex';
    try {
        const res = await fetch(SCRIPT_URL);
        data = await res.json();
        render();
    } catch (e) { console.error(e); }
    document.getElementById('loading').style.display = 'none';
}

function render() {
    const list = document.getElementById('entryList');
    list.innerHTML = '';
    let runBal = 0, totals = {s:0, st:0, o:0, sv:0};
    
    data.sort((a,b) => new Date(a.date) - new Date(b.date));
    data.forEach((row) => {
        runBal += (row.sales - row.stocking - row.other - row.savings);
        totals.s += row.sales; totals.st += row.stocking; totals.o += row.other; totals.sv += row.savings;
    });

    document.getElementById('totalSales').innerText = totals.s.toLocaleString() + " TZS";
    document.getElementById('totalStock').innerText = totals.st.toLocaleString() + " TZS";
    document.getElementById('totalOther').innerText = totals.o.toLocaleString() + " TZS";
    document.getElementById('totalSavings').innerText = totals.sv.toLocaleString() + " TZS";
    document.getElementById('balance').innerText = runBal.toLocaleString() + " TZS";

    const visibleData = [...data].reverse().slice(0, displayLimit);
    visibleData.forEach(row => {
        list.innerHTML += `
            <div class="entry-item">
                <div style="flex-grow:1">
                    <b>${row.date}</b><br>
                    <small>S: ${row.sales.toLocaleString()} | E: ${(row.stocking+row.other).toLocaleString()} TZS</small>
                </div>
                <div class="entry-actions">
                    <button class="action-icon" onclick="editFromList('${row.date}')">✏️</button>
                    <button class="action-icon" style="color:var(--red)" onclick="deleteEntry('${row.date}')">🗑️</button>
                </div>
            </div>`;
    });
    
    document.getElementById('loadMoreBtn').style.display = data.length > displayLimit ? 'block' : 'none';
}

function loadMore() {
    displayLimit += 5;
    render();
}

function editFromList(dateStr) {
    const found = data.find(item => item.date === dateStr);
    if (found) {
        document.getElementById('date').value = dateStr;
        document.getElementById('sales').value = found.sales;
        document.getElementById('stock').value = found.stocking;
        document.getElementById('other').value = found.other;
        document.getElementById('savings').value = found.savings;
        document.getElementById('formTitle').innerText = "Editing: " + dateStr;
        toggleCard('entryFormCard');
    }
}

function searchByDate() {
    const sDate = document.getElementById('searchDate').value;
    const found = data.find(item => item.date === sDate);
    if (found) {
        editFromList(sDate);
    } else { alert("No record found."); }
}

async function addRecord() {
    const record = {
        date: document.getElementById('date').value,
        sales: parseFloat(document.getElementById('sales').value) || 0,
        stocking: parseFloat(document.getElementById('stock').value) || 0,
        other: parseFloat(document.getElementById('other').value) || 0,
        savings: parseFloat(document.getElementById('savings').value) || 0
    };
    if (!record.date) return alert("Select date.");
    document.getElementById('loading').style.display = 'flex';
    try {
        await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(record) });
        document.getElementById('entryFormCard').style.display = 'none';
        setTimeout(fetchFromCloud, 1000);
    } catch (e) { alert("Error"); }
}

async function deleteEntry(dateToDelete) {
    if(!confirm("Permanently delete " + dateToDelete + "?")) return;
    document.getElementById('loading').style.display = 'flex';
    try {
        await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({action: "delete", date: dateToDelete}) });
        setTimeout(fetchFromCloud, 1000);
    } catch (e) {}
}

function generatePDF() {
    const monthVal = document.getElementById('reportMonth').value;
    if (!monthVal) return alert("Select month.");
    const filtered = data.filter(d => d.date.startsWith(monthVal));
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text("La Vida Report - " + monthVal, 14, 20);
    const tableData = filtered.map(d => [d.date, d.sales.toLocaleString(), d.stocking.toLocaleString(), d.other.toLocaleString(), d.savings.toLocaleString()]);
    doc.autoTable({ startY: 30, head: [['Date', 'Sales', 'Stock', 'Other', 'Savings']], body: tableData });
    doc.save(`LaVida_${monthVal}.pdf`);
}
</script>
</body>
</html>
