<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La Vida Control Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --blue: #004085;
    --dark: #001a33;
    --light: #f0f4f8;
    --green: #28a745;
    --gray: #6c757d;
    --red: #dc3545;
    --gold: #d4af37;
}
* { box-sizing: border-box; margin:0; padding:0; }
body { font-family:'DM Sans', sans-serif; background:var(--dark); }
body.unlocked { background: var(--light); }

/* LOGIN */
#loginPage { position:fixed; inset:0; display:flex; justify-content:center; align-items:center; background:var(--dark); }
.login-card { background:white; padding:30px; border-radius:20px; width:90%; max-width:300px; text-align:center; }
.pass-input { width:100%; padding:15px; font-size:1.3rem; text-align:center; margin-bottom:10px; }

/* HEADER */
.header { background:var(--dark); color:white; padding:14px; position:sticky; top:0; }
.today-panel { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:10px; }
.today-stat h4 { font-size:10px; color:var(--gold); }
.today-stat p { font-weight:bold; }

/* BUTTON */
.primary-cta { background:var(--blue); color:white; padding:14px; border:none; border-radius:12px; width:100%; margin:10px 0; }

/* ENTRY */
.entry-item { background:white; padding:12px; border-radius:12px; margin-bottom:8px; }
.sales-trend {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 700;
    margin-top: 4px;
    padding: 2px 7px;
    border-radius: 6px;
}
.tag-today {
    display: inline-block;
    background: var(--gold);
    color: var(--dark);
    font-size: 0.45rem;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 900;
    margin-left: 6px;
}

/* MODAL */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); }
.modal-overlay.active { display:flex; align-items:flex-end; }
.modal { background:white; width:100%; padding:20px; border-radius:20px 20px 0 0; }

/* TOAST */
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:black; color:white; padding:10px 20px; border-radius:10px; opacity:0; }
.toast.show { opacity:1; }
</style>
</head>

<body>

<div id="loginPage">
<div class="login-card">
<h2>LA VIDA</h2>
<input type="password" id="passInput" class="pass-input">
<button class="primary-cta" onclick="checkLogin()">UNLOCK</button>
<div id="pinError"></div>
</div>
</div>

<div id="mainApp" style="display:none">

<div class="header">
<div id="headerDate"></div>
<div class="today-panel">
<div class="today-stat"><h4>Sales</h4><p id="daySales"></p></div>
<div class="today-stat"><h4>Net</h4><p id="dayNet"></p></div>
<div class="today-stat"><h4>Balance</h4><p id="topBalance"></p></div>
</div>
</div>

<div style="padding:15px;">
<button class="primary-cta" onclick="openModal()">ADD ENTRY</button>
<div id="entryList"></div>
</div>

</div>

<div class="modal-overlay" id="overlay">
<div class="modal">
<input type="date" id="date"><br><br>
<input type="number" id="sales" placeholder="Sales"><br><br>
<input type="number" id="stock" placeholder="Stock"><br><br>
<input type="number" id="other" placeholder="Other"><br><br>
<input type="number" id="savings" placeholder="Savings"><br><br>
<button class="primary-cta" onclick="saveRecord()">SAVE</button>
</div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzDqLcc9kqXA8sH1cfdZ17asFXBXfZ8mwVpXXiPeZV-uesUw_KlIfquwZJsx2Q7pq00/exec";
const PIN = "112511";
const DAILY_TARGET = 50000;

let data = [];

function showToast(msg){
    const t=document.getElementById('toast');
    t.innerText=msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2500);
}

function checkLogin(){
    if(document.getElementById('passInput').value===PIN){
        loginPage.style.display='none';
        mainApp.style.display='block';
        document.body.classList.add('unlocked');
        fetchData();
    }
}

async function fetchData(){
    const res = await fetch(SCRIPT_URL);
    data = await res.json();
    render();
}

function render(){
    const today = new Date().toISOString().split('T')[0];

    let totalSales=0,totalStock=0,totalOther=0,totalSavings=0;
    let dayS=null,dayStock=0,dayOther=0,daySavings=0;

    data.forEach(r=>{
        totalSales+=+r.sales||0;
        totalStock+=+r.stocking||0;
        totalOther+=+r.other||0;
        totalSavings+=+r.savings||0;

        if(r.date.startsWith(today)){
            dayS=+r.sales||0;
            dayStock=+r.stocking||0;
            dayOther=+r.other||0;
            daySavings=+r.savings||0;
        }
    });

    let balance = totalSales-totalStock-totalOther-totalSavings;
    topBalance.innerText = balance+" TZS";

    if(dayS!==null){
        let net = dayS-dayStock-dayOther-daySavings;
        let margin = dayS>0?((net/dayS)*100).toFixed(0):0;

        daySales.innerText = dayS+" TZS";
        dayNet.innerText = net+" ("+margin+"%)";

        const alerts=[];

        if(dayS>=DAILY_TARGET){alerts.push("✅ Target hit")}
        else{alerts.push("⚠️ Below target")}

        if((dayStock+dayOther)>dayS){alerts.push("⚠️ Overspending")}

        if(net<0){alerts.push("❌ Negative profit")}
        else if(margin>=30){alerts.push("💰 Strong margin")}

        alerts.sort((a,b)=>a.includes("❌")?-1:0);

        if(alerts.length) showToast(alerts.join(" • "));
    }

    entryList.innerHTML = data.map(r=>`
        <div class="entry-item">
            ${r.date} ${r.date.startsWith(today)?'<span class="tag-today">TODAY</span>':''}
            <br>Sales: ${r.sales}
        </div>
    `).reverse().join('');
}

function openModal(){
    overlay.classList.add('active');
    setTimeout(()=>document.getElementById('sales').focus(),300);
}

async function saveRecord(){
    const record={
        date:date.value,
        sales:+sales.value||0,
        stocking:+stock.value||0,
        other:+other.value||0,
        savings:+savings.value||0
    };

    await fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",body:JSON.stringify(record)});
    navigator.vibrate?.(50);
    showToast("Saved");
    overlay.classList.remove('active');
    setTimeout(fetchData,1000);
}
</script>

</body>
</html>
