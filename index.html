<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Vida Minimart - Tracker</title>
    <style>
        :root {
            --la-vida-blue: #0056b3;
            --la-vida-dark: #003366;
            --la-vida-light: #e6f0ff;
            --success-green: #28a745;
            --danger-red: #dc3545;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            padding: 10px;
            color: #333;
        }

        /* --- LOGIN PAGE STYLES --- */
        #loginPage {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--la-vida-dark);
        }
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* --- MAIN APP STYLES --- */
        #mainApp { display: none; }

        .container { 
            max-width: 1000px; 
            margin: auto; 
            background: white; 
            border-radius: 15px; 
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .banner-container {
            width: 100%;
            background: #eee;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Fixed image loading for large files */
        .banner-container img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        .content { padding: 20px; }

        /* --- SUMMARY CARDS AT TOP --- */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid var(--la-vida-blue);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card h4 { margin: 0; color: #666; font-size: 0.75rem; text-transform: uppercase; }
        .card p { margin: 5px 0 0; font-size: 1.2rem; font-weight: bold; color: var(--la-vida-dark); }
        .card.balance-card { border-left-color: var(--success-green); }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            background: var(--la-vida-light);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.8rem; font-weight: bold; color: var(--la-vida-dark); margin-bottom: 3px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; }

        .btn-add { 
            background: var(--la-vida-blue); color: white; border: none; 
            padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer;
        }

        .table-wrapper { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: var(--la-vida-dark); color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }

        .btn-delete { background: none; border: 1px solid var(--danger-red); color: var(--danger-red); cursor: pointer; padding: 2px 5px; border-radius: 4px; }

        .footer { text-align: center; padding: 20px; color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="loginPage">
    <div class="login-box">
        <h2 style="color: var(--la-vida-dark)">La Vida Login</h2>
        <input type="password" id="passInput" placeholder="Enter Password" style="width: 80%; margin-bottom: 15px;"><br>
        <button class="btn-add" onclick="checkLogin()" style="width: 90%;">Open Tracker</button>
        <p id="loginError" style="color: red; display: none; font-size: 0.8rem; margin-top: 10px;">Incorrect Password</p>
    </div>
</div>

<div id="mainApp">
    <div class="container">
        <div class="banner-container">
            <img src="LA VIDA MINIMART 3.jpg" alt="Logo Loading..." onerror="this.alt='Logo not found - Check filename'">
        </div>

        <div class="content">
            <div class="summary-cards">
                <div class="card"><h4>Total Sales</h4><p id="totalSales">0</p></div>
                <div class="card"><h4>Stocking</h4><p id="totalStock">0</p></div>
                <div class="card"><h4>Expenses</h4><p id="totalOther">0</p></div>
                <div class="card"><h4>Savings</h4><p id="totalSavings">0</p></div>
                <div class="card balance-card"><h4>Balance</h4><p id="balance">0</p></div>
            </div>

            <h2>New Daily Entry</h2>
            <div class="input-grid">
                <div class="input-group"><label>Date</label><input type="date" id="date"></div>
                <div class="input-group"><label>Sales</label><input type="number" id="sales"></div>
                <div class="input-group"><label>Stocking</label><input type="number" id="stock"></div>
                <div class="input-group"><label>Other</label><input type="number" id="other"></div>
                <div class="input-group"><label>Savings</label><input type="number" id="savings"></div>
                <button class="btn-add" onclick="addRecord()">Add Entry</button>
            </div>

            <h2>Recent Logs</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Sales</th>
                            <th>Stock</th>
                            <th>Other</th>
                            <th>Save</th>
                            <th>Bal</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
        <div class="footer">© 2026 La Vida Minimart | 0676 221 903</div>
    </div>
</div>

<script>
// Password protection
function checkLogin() {
    const pass = document.getElementById('passInput').value;
    if (pass === "lavida2026") { // Set your password here
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        render();
    } else {
        document.getElementById('loginError').style.display = 'block';
    }
}

let data = JSON.parse(localStorage.getItem('la_vida_data')) || [];

async function addRecord() {
    const date = document.getElementById('date').value;
    const sales = parseFloat(document.getElementById('sales').value) || 0;
    const stocking = parseFloat(document.getElementById('stock').value) || 0;
    const other = parseFloat(document.getElementById('other').value) || 0;
    const savings = parseFloat(document.getElementById('savings').value) || 0;

    if (!date) return alert('Select date');

    const record = { date, sales, stocking, other, savings };
    data.push(record);
    localStorage.setItem('la_vida_data', JSON.stringify(data));

    // Send to Sheets
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzPgWzw2hfk8d2R4thkTJ-PFdpFGvdMMAUY2rqKFwd6ULfc37BdbdAH45aCxQqQVOVT/exec";
    fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(record) });

    render();
    document.querySelectorAll('input:not([type="date"])').forEach(i => i.value = '');
}

function deleteRecord(index) {
    if(confirm("Delete this entry?")) {
        data.splice(index, 1);
        localStorage.setItem('la_vida_data', JSON.stringify(data));
        render();
    }
}

function render() {
    let table = document.getElementById('tableBody');
    table.innerHTML = '';
    let runningBalance = 0;
    let totals = { s:0, st:0, o:0, sv:0 };

    data.forEach((row, index) => {
        runningBalance += (row.sales - row.stocking - row.other - row.savings);
        totals.s += row.sales; totals.st += row.stocking; totals.o += row.other; totals.sv += row.savings;

        table.innerHTML += `<tr>
            <td>${row.date}</td>
            <td>${row.sales.toLocaleString()}</td>
            <td>${row.stocking.toLocaleString()}</td>
            <td>${row.other.toLocaleString()}</td>
            <td>${row.savings.toLocaleString()}</td>
            <td><strong>${runningBalance.toLocaleString()}</strong></td>
            <td><button class="btn-delete" onclick="deleteRecord(${index})">×</button></td>
        </tr>`;
    });

    document.getElementById('totalSales').innerText = totals.s.toLocaleString();
    document.getElementById('totalStock').innerText = totals.st.toLocaleString();
    document.getElementById('totalOther').innerText = totals.o.toLocaleString();
    document.getElementById('totalSavings').innerText = totals.sv.toLocaleString();
    document.getElementById('balance').innerText = runningBalance.toLocaleString();
}
</script>
</body>
</html>
