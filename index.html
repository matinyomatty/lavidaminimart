<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Vida Control Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #004085;
            --dark: #001a33;
            --light: #f0f4f8;
            --green: #28a745;
            --gray: #6c757d;
            --red: #dc3545;
            --gold: #d4af37;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { height: 100%; }
        html { background: var(--dark); }
        body { background: var(--dark); font-family: 'DM Sans', system-ui, sans-serif; color: var(--dark); }
        body.unlocked { background: var(--light); }

        /* ── LOGIN PAGE (REVISED) ── */
        #loginPage {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #002b55 0%, #001a33 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 1000;
        }
        .login-card {
            background: white;
            width: 100%;
            max-width: 340px;
            padding: 48px 28px 32px;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeInScale 0.4s ease-out;
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .login-logo {
            font-family: 'Syne', sans-serif; 
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 6px; 
            color: var(--dark); 
            margin-bottom: 8px;
        }
        .login-sub { 
            color: var(--gray); 
            font-size: 0.75rem; 
            margin-bottom: 36px; 
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
        }
        .pass-input {
            width: 100%; 
            padding: 18px; 
            border: 2px solid #edf2f7;
            border-radius: 18px; 
            font-size: 1.6rem; 
            text-align: center;
            letter-spacing: 12px; 
            background: #f8fafc; 
            outline: none;
            font-family: 'DM Sans', sans-serif; 
            margin-bottom: 20px;
            transition: all 0.2s ease;
        }
        .pass-input:focus { 
            border-color: var(--blue); 
            background: white; 
            box-shadow: 0 0 0 4px rgba(0, 64, 133, 0.05);
        }
        #pinError { color: var(--red); font-size: 0.78rem; min-height: 20px; margin-top: -10px; margin-bottom: 15px; font-weight: 600; }

        /* ── MAIN APP ── */
        #mainApp { display: none; }

        /* ── STICKY HEADER ── */
        .header {
            background: var(--dark); color: white;
            padding: 14px 16px 16px;
            border-bottom: 4px solid var(--gold);
            position: sticky; top: 0; z-index: 500;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
        }
        .header-top {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 12px;
        }
        .header-logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.3rem; letter-spacing: 4px; color: var(--gold);
        }
        .header-date { font-size: 0.65rem; color: rgba(255,255,255,0.5); text-align: right; }

        .today-panel {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 8px; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 14px; padding: 10px 12px;
        }
        .today-stat h4 {
            font-size: 0.5rem; color: var(--gold);
            text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px;
        }
        .today-stat p { font-size: 0.82rem; font-weight: 700; color: white; }
        .today-stat.right { text-align: right; }
        .today-stat.center { text-align: center; }

        /* ── CONTAINER ── */
        .container { padding: 16px; max-width: 480px; margin: auto; }

        /* ── PRIMARY CTA ── */
        .primary-cta {
            background: var(--blue); color: white; width: 100%;
            padding: 17px; border: none; border-radius: 16px;
            font-size: 1rem; font-weight: 800; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-bottom: 16px;
            box-shadow: 0 8px 20px rgba(0,64,133,0.3);
            font-family: 'DM Sans', sans-serif; letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .primary-cta:active { transform: scale(0.97); }

        /* ── SUMMARY GRID ── */
        .summary-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; margin-bottom: 16px;
        }
        .stat-card {
            background: white; padding: 14px; border-radius: 16px;
            border-left: 4px solid var(--blue);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .stat-card h4 {
            font-size: 0.58rem; color: var(--gray);
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
        }
        .stat-card p { font-size: 0.88rem; font-weight: 700; }

        /* ── SECONDARY ACTIONS ── */
        .secondary-actions { display: flex; gap: 10px; margin-bottom: 18px; }
        .btn-sec {
            flex: 1; padding: 12px; border-radius: 12px;
            border: 1px solid #dde3ea; background: white;
            font-weight: 700; cursor: pointer;
            font-size: 0.75rem; font-family: 'DM Sans', sans-serif;
        }

        /* ── TRANSACTION LIST ── */
        .section-label {
            font-size: 0.65rem; font-weight: 700; color: var(--gray);
            text-transform: uppercase; letter-spacing: 1px;
            display: block; margin-bottom: 10px;
        }
        .entry-item {
            background: white; padding: 14px 14px 14px 16px;
            border-radius: 16px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid #e0e6ef;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }
        .entry-item.is-today { border-left-color: var(--gold); background: #fffdf5; }
        .entry-date { font-size: 0.88rem; font-weight: 700; }
        .tag-today {
            display: inline-block; background: var(--gold); color: var(--dark);
            font-size: 0.45rem; padding: 2px 6px; border-radius: 4px;
            font-weight: 900; margin-left: 6px; vertical-align: middle;
        }
        .entry-meta { font-size: 0.72rem; color: var(--gray); margin-top: 3px; }
        .entry-note { font-size: 0.68rem; color: var(--gray); font-style: italic; margin-top: 4px; }
        .sales-trend { font-size: 0.68rem; font-weight: 700; margin-top: 4px; padding: 2px 7px; border-radius: 6px; display: inline-block; }
        .trend-up { background: rgba(74, 222, 128, 0.15); color: #166534; }
        .trend-down { background: rgba(248, 113, 113, 0.15); color: #991b1b; }

        .action-btns { display: flex; gap: 8px; }
        .btn-circle {
            border: none; background: #f0f3f6;
            width: 38px; height: 38px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* ── MODALS ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 1500;
            backdrop-filter: blur(4px);
            justify-content: center; align-items: flex-end;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white; width: 100%; max-width: 480px;
            border-radius: 28px 28px 0 0;
            border-top: 5px solid var(--blue);
            padding: 24px 20px 36px;
            max-height: 92vh; overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; text-align: center; margin-bottom: 20px; }
        
        .field-group { margin-bottom: 14px; }
        .field-label { font-size: 0.65rem; font-weight: 700; color: var(--blue); text-transform: uppercase; margin-bottom: 6px; display: block; }
        input, textarea {
            width: 100%; padding: 13px; border: 1.5px solid #e0e6ef;
            border-radius: 12px; font-size: 0.95rem; background: #fafbfc; outline: none;
        }

        /* ── UTILS ── */
        .loading-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,26,51,0.85);
            z-index: 9999; justify-content: center; align-items: center; flex-direction: column; color: white;
        }
        .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 24px; border-radius: 12px; font-size: 0.82rem; z-index: 9998; opacity: 0; transition: 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--gray); font-size: 0.85rem; }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
    <p style="margin-top:15px; font-size:0.7rem; letter-spacing:2px;">SYNCING DATA</p>
</div>

<div id="toast" class="toast"></div>

<div id="loginPage">
    <div class="login-card">
        <div class="login-logo">LA VIDA</div>
        <div class="login-sub">Authorized Access Only</div>
        
        <input type="password" id="passInput" inputmode="numeric" 
               class="pass-input" placeholder="••••••" 
               onkeypress="if(event.key==='Enter') checkLogin()">
        
        <div id="pinError"></div>

        <button class="primary-cta" style="margin-bottom:0;" onclick="checkLogin()">
            UNLOCK SYSTEM
        </button>
    </div>
</div>

<div id="mainApp">
    <div class="header">
        <div class="header-top">
            <div class="header-logo">LA VIDA</div>
            <div class="header-date" id="headerDate"></div>
        </div>
        <div class="today-panel">
            <div class="today-stat">
                <h4>Today Sales</h4>
                <p id="daySales">— TZS</p>
            </div>
            <div class="today-stat center">
                <h4>Today Net</h4>
                <p id="dayNet">—</p>
            </div>
            <div class="today-stat right">
                <h4>All Balance</h4>
                <p id="topBalance" style="color:var(--gold)">— TZS</p>
            </div>
        </div>
    </div>

    <div class="container">
        <button class="primary-cta" onclick="openModal('entry')" style="margin-top:14px;">
            ➕ ADD DAILY ENTRY
        </button>

        <div class="summary-grid">
            <div class="stat-card"><h4>Sales</h4><p id="totalSales">...</p></div>
            <div class="stat-card"><h4>Stock</h4><p id="totalStock">...</p></div>
            <div class="stat-card"><h4>Expenses</h4><p id="totalOther">...</p></div>
            <div class="stat-card"><h4>Savings</h4><p id="totalSavings">...</p></div>
        </div>

        <div class="secondary-actions">
            <button class="btn-sec" onclick="openModal('search')">🔍 FIND DATE</button>
            <button class="btn-sec" onclick="openModal('report')">📄 REPORTS</button>
        </div>

        <span class="section-label">Transaction History</span>
        <div id="entryList"></div>
        <button id="loadMoreBtn" class="btn-sec" style="width:100%; margin-top:4px; display:none;" onclick="loadMore()">VIEW MORE</button>
    </div>
</div>

<div class="modal-overlay" id="overlayEntry" onclick="overlayClose(event,'overlayEntry')">
    <div class="modal">
        <div class="modal-title" id="formTitle">New Entry</div>
        <div class="field-group"><span class="field-label">Date</span><input type="date" id="date"></div>
        <div class="field-group"><span class="field-label">Sales (TZS)</span><input type="number" id="sales" inputmode="decimal"></div>
        <div class="field-group"><span class="field-label">Stocking (TZS)</span><input type="number" id="stock" inputmode="decimal"></div>
        <div class="field-group"><span class="field-label">Other Expenses (TZS)</span><input type="number" id="other" inputmode="decimal"></div>
        <div class="field-group"><span class="field-label">Savings (TZS)</span><input type="number" id="savings" inputmode="decimal"></div>
        <div class="field-group"><span class="field-label">Note</span><textarea id="note"></textarea></div>
        <button class="primary-cta" onclick="saveRecord()">SAVE RECORD</button>
        <button class="btn-sec" style="width:100%; border:none;" onclick="closeModals()">CANCEL</button>
    </div>
</div>

<div class="modal-overlay" id="overlaySearch" onclick="overlayClose(event,'overlaySearch')">
    <div class="modal">
        <div class="modal-title">Find a Date</div>
        <div class="field-group"><input type="date" id="searchDate"></div>
        <button class="primary-cta" onclick="executeSearch()">SEARCH</button>
        <button class="btn-sec" style="width:100%; border:none;" onclick="closeModals()">CLOSE</button>
    </div>
</div>

<div class="modal-overlay" id="overlayReport" onclick="overlayClose(event,'overlayReport')">
    <div class="modal">
        <div class="modal-title">Monthly Report</div>
        <div class="field-group"><input type="month" id="reportMonth"></div>
        <button class="primary-cta" onclick="generatePDF()">DOWNLOAD PDF</button>
        <button class="btn-sec" style="width:100%; border:none;" onclick="closeModals()">CLOSE</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzDqLcc9kqXA8sH1cfdZ17asFXBXfZ8mwVpXXiPeZV-uesUw_KlIfquwZJsx2Q7pq00/exec";
const PIN = "112511"; 

let data = [];
let displayLimit = 5;

function getLocalDateStr(d = new Date()) { return d.toLocaleDateString('sv-SE'); }
function fmt(n) { return Number(n).toLocaleString() + " TZS"; }
function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
function showLoader(on) { document.getElementById('loadingOverlay').style.display = on ? 'flex' : 'none'; }

function checkLogin() {
    const entered = document.getElementById('passInput').value;
    if (entered === PIN) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.body.classList.add('unlocked');
        setHeaderDate();
        fetchData();
    } else {
        document.getElementById('pinError').innerText = "Invalid PIN. Access Denied.";
        document.getElementById('passInput').value = '';
        setTimeout(() => document.getElementById('pinError').innerText = '', 2000);
    }
}

function setHeaderDate() {
    document.getElementById('headerDate').innerHTML = new Date().toLocaleDateString('en-TZ', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
}

async function fetchData() {
    showLoader(true);
    try {
        const res = await fetch(SCRIPT_URL + '?t=' + Date.now());
        data = await res.json();
        render();
    } catch (e) { showToast("⚠️ Connection error."); }
    showLoader(false);
}

function render() {
    const list = document.getElementById('entryList');
    list.innerHTML = '';
    let totalSales = 0, totalStock = 0, totalOther = 0, totalSavings = 0;
    let dayS = null, dayStock = 0, dayOther = 0, daySavings = 0;
    const todayStr = getLocalDateStr();

    data.sort((a, b) => new Date(a.date) - new Date(b.date));
    const salesByDate = {};

    data.forEach(row => {
        const rowDate = (row.date || '').split('T')[0];
        const s = Number(row.sales) || 0;
        const st = Number(row.stocking) || 0;
        const o = Number(row.other) || 0;
        const sv = Number(row.savings) || 0;

        salesByDate[rowDate] = s;
        totalSales += s; totalStock += st; totalOther += o; totalSavings += sv;

        if (rowDate === todayStr) {
            dayS = s; dayStock = st; dayOther = o; daySavings = sv;
        }
    });

    const bal = totalSales - totalStock - totalOther - totalSavings;
    document.getElementById('topBalance').innerText = fmt(bal);
    document.getElementById('totalSales').innerText = fmt(totalSales);
    document.getElementById('totalStock').innerText = fmt(totalStock);
    document.getElementById('totalOther').innerText = fmt(totalOther);
    document.getElementById('totalSavings').innerText = fmt(totalSavings);

    if (dayS !== null) {
        const net = dayS - dayStock - dayOther - daySavings;
        document.getElementById('daySales').innerText = fmt(dayS);
        document.getElementById('dayNet').innerText = fmt(net);
        document.getElementById('dayNet').style.color = net >= 0 ? '#4ade80' : '#f87171';
    }

    const sorted = [...data].reverse();
    const visible = sorted.slice(0, displayLimit);

    if (visible.length === 0) {
        list.innerHTML = '<div class="empty-state">No records found.</div>';
    } else {
        visible.forEach(row => {
            const d = (row.date || '').split('T')[0];
            const s = Number(row.sales) || 0;
            const exp = (Number(row.stocking) || 0) + (Number(row.other) || 0);
            
            // Trend
            const prev = new Date(d); prev.setDate(prev.getDate() - 1);
            const prevS = salesByDate[getLocalDateStr(prev)];
            let trend = '';
            if (prevS > 0) {
                const diff = ((s - prevS) / prevS) * 100;
                trend = `<span class="sales-trend ${diff >= 0 ? 'trend-up' : 'trend-down'}">${diff >= 0 ? '↑' : '↓'} ${Math.abs(diff).toFixed(0)}%</span>`;
            }

            const item = document.createElement('div');
            item.className = 'entry-item' + (d === todayStr ? ' is-today' : '');
            item.innerHTML = `
                <div style="flex:1">
                    <div class="entry-date">${d}${d === todayStr ? '<span class="tag-today">TODAY</span>' : ''}</div>
                    <div class="entry-meta">Sales: ${s.toLocaleString()} | Exp: ${exp.toLocaleString()}</div>
                    ${trend}
                </div>
                <div class="action-btns">
                    <button class="btn-circle" onclick="editRow('${d}')">✏️</button>
                </div>`;
            list.appendChild(item);
        });
    }
    document.getElementById('loadMoreBtn').style.display = data.length > displayLimit ? 'block' : 'none';
}

function loadMore() { displayLimit += 5; render(); }

function openModal(type) {
    closeModals();
    if (type === 'entry') {
        document.getElementById('formTitle').innerText = "New Entry";
        document.querySelectorAll('#overlayEntry input, #overlayEntry textarea').forEach(i => i.value = '');
        document.getElementById('date').value = getLocalDateStr();
        document.getElementById('overlayEntry').classList.add('active');
    } else if (type === 'search') document.getElementById('overlaySearch').classList.add('active');
    else if (type === 'report') {
        document.getElementById('reportMonth').value = getLocalDateStr().slice(0,7);
        document.getElementById('overlayReport').classList.add('active');
    }
}

function closeModals() { document.querySelectorAll('.modal-overlay').forEach(o => o.classList.remove('active')); }
function overlayClose(e, id) { if (e.target.id === id) closeModals(); }

async function saveRecord() {
    const rec = {
        date: document.getElementById('date').value,
        sales: parseFloat(document.getElementById('sales').value) || 0,
        stocking: parseFloat(document.getElementById('stock').value) || 0,
        other: parseFloat(document.getElementById('other').value) || 0,
        savings: parseFloat(document.getElementById('savings').value) || 0,
        note: document.getElementById('note').value.trim()
    };
    if (!rec.date) return showToast("Date required");
    closeModals(); showLoader(true);
    try {
        await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(rec) });
        showToast("✅ Saved");
        setTimeout(fetchData, 1500);
    } catch (e) { showToast("Save error"); showLoader(false); }
}

function editRow(date) {
    const found = data.find(d => (d.date || '').split('T')[0] === date);
    if (!found) return;
    document.getElementById('formTitle').innerText = "Edit: " + date;
    document.getElementById('date').value = date;
    document.getElementById('sales').value = found.sales;
    document.getElementById('stock').value = found.stocking;
    document.getElementById('other').value = found.other;
    document.getElementById('savings').value = found.savings;
    document.getElementById('note').value = found.note || '';
    document.getElementById('overlayEntry').classList.add('active');
}

function executeSearch() {
    const d = document.getElementById('searchDate').value;
    if (data.some(r => (r.date || '').split('T')[0] === d)) { closeModals(); editRow(d); }
    else showToast("No record for " + d);
}

function generatePDF() {
    const m = document.getElementById('reportMonth').value;
    const filtered = data.filter(d => (d.date || '').startsWith(m));
    if (!filtered.length) return showToast("No data for " + m);
    
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFontSize(18); doc.text("LA VIDA REPORT - " + m, 14, 20);
    
    const rows = filtered.map(r => [
        (r.date || '').split('T')[0], 
        fmt(r.sales), 
        fmt(r.stocking), 
        fmt(r.other), 
        fmt(r.savings),
        fmt(Number(r.sales) - (Number(r.stocking)+Number(r.other)+Number(r.savings)))
    ]);
    
    doc.autoTable({
        startY: 30,
        head: [['Date', 'Sales', 'Stock', 'Exp', 'Sav', 'Net']],
        body: rows,
        theme: 'striped'
    });
    doc.save(`LaVida_${m}.pdf`);
    showToast("PDF Downloaded");
}
</script>
</body>
</html>
