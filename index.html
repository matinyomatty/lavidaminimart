<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Vida Minimart - POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #004085;
            --dark: #001a33;
            --light: #f0f4f8;
            --green: #28a745;
            --gray: #6c757d;
            --red: #dc3545;
            --gold: #d4af37;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { min-height: 100vh; font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--dark); overflow-x: hidden; }
        body.unlocked { background: var(--light); }

        /* Splash & Pin Pad */
        .splash { position: fixed; inset: 0; background: var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.5s ease; }
        .pin-display { color: white; font-size: 2.5rem; letter-spacing: 8px; margin-bottom: 30px; font-weight: 800; min-height: 4rem; }
        .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 280px; }
        .pin-btn { width: 80px; height: 80px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: white; font-size: 1.6rem; font-weight: 700; cursor: pointer; transition: background 0.1s; }
        .pin-btn:active { background: rgba(255,255,255,0.2); }

        /* Dashboard Layout */
        .container { max-width: 500px; margin: 0 auto; padding: 20px; display: none; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; color: var(--blue); letter-spacing: -0.5px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .card { background: white; padding: 18px; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.04); }
        .card-label { font-size: 0.75rem; color: var(--gray); font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .card-val { font-size: 1.2rem; font-weight: 800; color: var(--dark); }

        /* Action Buttons */
        .primary-cta { width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: 700; font-size: 1rem; cursor: pointer; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-pos { background: var(--green); color: white; }
        .btn-entry { background: var(--blue); color: white; }

        /* Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,26,51,0.85); display: none; align-items: flex-end; z-index: 2000; }
        .modal-overlay.active { display: flex; }
        .modal { width: 100%; background: white; border-radius: 30px 30px 0 0; padding: 25px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        input, select { width: 100%; padding: 15px; border-radius: 14px; border: 1.5px solid #e0e6ef; margin-bottom: 15px; font-size: 1rem; font-family: inherit; }
        .cart-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f4f8; font-size: 0.9rem; }
        
        .loader { width: 30px; height: 30px; border: 3px solid #f3f3f3; border-top: 3px solid var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; display: none; margin: 15px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="splash" id="splash">
    <div class="logo" style="color: white; font-size: 2rem; margin-bottom: 10px;">LA VIDA</div>
    <div class="pin-display" id="pinDisplay">••••••</div>
    <div class="pin-pad">
        <button class="pin-btn" onclick="addPin('1')">1</button>
        <button class="pin-btn" onclick="addPin('2')">2</button>
        <button class="pin-btn" onclick="addPin('3')">3</button>
        <button class="pin-btn" onclick="addPin('4')">4</button>
        <button class="pin-btn" onclick="addPin('5')">5</button>
        <button class="pin-btn" onclick="addPin('6')">6</button>
        <button class="pin-btn" onclick="addPin('7')">7</button>
        <button class="pin-btn" onclick="addPin('8')">8</button>
        <button class="pin-btn" onclick="addPin('9')">9</button>
        <button class="pin-btn" style="background:var(--red); border:none;" onclick="resetPin()">C</button>
        <button class="pin-btn" onclick="addPin('0')">0</button>
        <button class="pin-btn" style="background:var(--green); border:none;" onclick="validateLogin()">OK</button>
    </div>
</div>

<div class="container" id="mainApp">
    <header>
        <div class="logo">LA VIDA</div>
        <div id="topDate" style="font-weight: 700; font-size: 0.85rem; color: var(--gray);"></div>
    </header>

    <div class="stats-grid">
        <div class="card">
            <div class="card-label">Daily Sales</div>
            <div class="card-val" id="dispToday">0 TZS</div>
        </div>
        <div class="card">
            <div class="card-label">Monthly</div>
            <div class="card-val" id="dispMonth">0 TZS</div>
        </div>
    </div>

    <button class="primary-cta btn-pos" onclick="toggleModal('pos', true)">
        🛒 POS REGISTER
    </button>
    <button class="primary-cta btn-entry" onclick="toggleModal('manual', true)">
        ➕ MANUAL ENTRY
    </button>

    <div class="loader" id="syncLoader"></div>
    <div id="recentHistory" style="margin-top: 20px;"></div>
</div>

<div class="modal-overlay" id="modalPOS">
    <div class="modal">
        <div class="logo" style="font-size: 1.1rem; margin-bottom: 20px;">Register</div>
        
        <select id="selItem" onchange="showItemDetails()">
            <option value="">Select Product...</option>
        </select>

        <div style="display: flex; gap: 12px;">
            <select id="selType" style="flex: 2;" onchange="showItemDetails()">
                <option value="unit">Single Unit</option>
                <option value="pack">Full Package</option>
            </select>
            <input type="number" id="inpQty" value="1" style="flex: 1; text-align: center;">
        </div>

        <div id="itemDetail" style="margin-bottom: 15px; font-weight: 700; color: var(--blue); font-size: 0.85rem;"></div>

        <button class="primary-cta btn-entry" onclick="pushToCart()">ADD TO CART</button>

        <div style="background: #f8f9fa; border-radius: 18px; padding: 15px; margin-top: 15px;">
            <div style="font-size: 0.7rem; font-weight: 800; color: var(--gray); margin-bottom: 10px;">SHOPPING CART</div>
            <div id="cartList"></div>
            <div style="display: flex; justify-content: space-between; border-top: 2px dashed #ddd; margin-top: 12px; padding-top: 12px; font-weight: 800;">
                <span>TOTAL:</span>
                <span id="cartSum" style="color: var(--green);">0 TZS</span>
            </div>
        </div>

        <button class="primary-cta btn-pos" style="margin-top: 20px;" onclick="finalizePOS()">COMPLETE TRANSACTION</button>
        <button class="primary-cta" style="background:none; color:var(--gray);" onclick="toggleModal('pos', false)">Cancel</button>
    </div>
</div>

<div class="modal-overlay" id="modalManual">
    <div class="modal">
        <div class="logo" style="font-size: 1.1rem; margin-bottom: 20px;">Add Sale</div>
        <input type="number" id="mSales" placeholder="Sales Amount (TZS)">
        <input type="number" id="mStock" placeholder="Stocking Costs">
        <input type="text" id="mNote" placeholder="Notes">
        <button class="primary-cta btn-entry" onclick="submitManual()">SAVE DATA</button>
        <button class="primary-cta" style="background:none; color:var(--gray);" onclick="toggleModal('manual', false)">Cancel</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbygOnwnnSJnLnxv6PULm-svK7zsxye7kZjMVZSyT0hkgSKDQ2N1uNLP6s1Y-LHjYOBQ/exec";
    const SECRET_PIN = "112511";
    let currentInput = "";
    let localInventory = [];
    let localSales = [];
    let activeCart = [];

    // --- PIN LOGIC ---
    function addPin(num) {
        if (currentInput.length < 6) {
            currentInput += num;
            updatePinDisplay();
        }
    }
    function resetPin() { currentInput = ""; updatePinDisplay(); }
    function updatePinDisplay() {
        const display = document.getElementById('pinDisplay');
        display.innerText = "•".repeat(currentInput.length).padEnd(6, "•");
    }
    function validateLogin() {
        if (currentInput === SECRET_PIN) {
            document.getElementById('splash').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('splash').style.display = "none";
                document.body.classList.add('unlocked');
                document.getElementById('mainApp').style.display = "block";
                syncData();
            }, 400);
        } else {
            alert("Incorrect Password");
            resetPin();
        }
    }

    // --- DATA HANDLING ---
    async function syncData() {
        showLoader(true);
        try {
            const r = await fetch(SCRIPT_URL + "?t=" + Date.now());
            const data = await r.json();
            localSales = data.entries;
            localInventory = data.inventory;
            updateDashboard();
            loadInventoryDropdown();
        } catch (e) { console.error(e); }
        showLoader(false);
    }

    function updateDashboard() {
        const todayStr = new Date().toLocaleDateString('sv-SE');
        const todayData = localSales.find(s => s.date.includes(todayStr));
        
        document.getElementById('dispToday').innerText = (todayData ? Number(todayData.sales).toLocaleString() : "0") + " TZS";
        
        const total = localSales.reduce((sum, item) => sum + (Number(item.sales) || 0), 0);
        document.getElementById('dispMonth').innerText = total.toLocaleString() + " TZS";

        const history = document.getElementById('recentHistory');
        history.innerHTML = '<div style="font-weight:800; font-size:0.7rem; color:var(--gray); margin-bottom:10px;">RECENT LOGS</div>';
        localSales.slice(-4).reverse().forEach(s => {
            history.innerHTML += `
                <div class="card" style="margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; padding:15px;">
                    <div style="font-size:0.8rem; font-weight:700;">${s.date.split('T')[0]}</div>
                    <div style="color:var(--green); font-weight:800;">+${Number(s.sales).toLocaleString()}</div>
                </div>`;
        });
    }

    // --- POS FUNCTIONS ---
    function loadInventoryDropdown() {
        const sel = document.getElementById('selItem');
        sel.innerHTML = '<option value="">Select Product...</option>';
        localInventory.forEach(i => {
            const o = document.createElement('option');
            o.value = i.row_index;
            o.innerText = `${i.item} (${Number(i.qty_packages).toFixed(1)} pk left)`;
            sel.appendChild(o);
        });
    }

    function showItemDetails() {
        const idx = document.getElementById('selItem').value;
        if (!idx) return;
        const item = localInventory.find(i => i.row_index == idx);
        const type = document.getElementById('selType').value;
        const price = type === 'pack' ? item.sell_price_pack : item.sell_price_unit;
        document.getElementById('itemDetail').innerText = `Price: ${Number(price).toLocaleString()} TZS per ${type}`;
    }

    function pushToCart() {
        const idx = document.getElementById('selItem').value;
        const qty = parseInt(document.getElementById('inpQty').value);
        const type = document.getElementById('selType').value;
        if (!idx || qty < 1) return;

        const item = localInventory.find(i => i.row_index == idx);
        const price = type === 'pack' ? item.sell_price_pack : item.sell_price_unit;

        activeCart.push({
            row_index: item.row_index,
            name: item.item,
            qty: qty,
            type: type,
            price: price,
            pack_size: item.pack_size
        });
        renderCart();
    }

    function renderCart() {
        const list = document.getElementById('cartList');
        list.innerHTML = "";
        let sum = 0;
        activeCart.forEach((c, i) => {
            const line = c.qty * c.price;
            sum += line;
            list.innerHTML += `
                <div class="cart-item">
                    <span>${c.qty}x ${c.name}</span>
                    <span>${line.toLocaleString()} <b style="color:var(--red); margin-left:8px;" onclick="activeCart.splice(${i},1);renderCart();">×</b></span>
                </div>`;
        });
        document.getElementById('cartSum').innerText = sum.toLocaleString() + " TZS";
    }

    async function finalizePOS() {
        if (activeCart.length === 0) return;
        showLoader(true);
        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "pos_checkout", cart: activeCart })
            });
            activeCart = [];
            toggleModal('pos', false);
            syncData();
        } catch (e) { alert("Error completing sale."); }
        showLoader(false);
    }

    // --- UTILS ---
    function toggleModal(id, show) {
        const el = id === 'pos' ? document.getElementById('modalPOS') : document.getElementById('modalManual');
        el.classList.toggle('active', show);
        if (id === 'pos' && show) { activeCart = []; renderCart(); }
    }
    function showLoader(s) { document.getElementById('syncLoader').style.display = s ? "block" : "none"; }
    document.getElementById('topDate').innerText = new Date().toDateString().toUpperCase();
</script>

</body>
</html>
