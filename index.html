<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Vida Control</title>
    <style>
        :root { --blue: #004085; --dark: #001a33; --light: #f4f7f9; --green: #28a745; --gray: #6c757d; --red: #dc3545; --gold: #d4af37; }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--light); margin: 0; padding: 0; color: var(--dark); }
        
        /* Branding & Today Panel */
        .header { background: var(--dark); color: white; padding: 20px 15px; border-bottom: 5px solid var(--blue); }
        .header h1 { margin: 0; font-size: 1.5rem; letter-spacing: 2px; color: var(--gold); }
        .today-panel { background: rgba(255,255,255,0.05); margin-top: 15px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; border: 1px solid rgba(212,175,55,0.3); }
        .today-stat h4 { margin: 0; font-size: 0.6rem; color: var(--gold); text-transform: uppercase; }
        .today-stat p { margin: 5px 0 0; font-size: 1rem; font-weight: bold; }

        /* Login */
        #loginPage { display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--dark); padding: 20px; }
        .login-card { background: white; width: 100%; max-width: 340px; padding: 40px 25px; border-radius: 24px; text-align: center; }
        
        #mainApp { display: none; }
        .container { padding: 15px; max-width: 480px; margin: auto; }
        
        /* New Entry: Center of Gravity */
        .primary-cta { background: var(--blue); color: white; width: 100%; padding: 18px; border: none; border-radius: 16px; font-size: 1.1rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,64,133,0.3); }
        
        /* Summaries - Stacked on Mobile */
        .summary-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px; }
        @media(min-width: 400px) { .summary-grid { grid-template-columns: 1fr 1fr; } }
        
        .stat-card { background: white; padding: 15px; border-radius: 16px; border-left: 4px solid var(--blue); box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .stat-card h4 { margin: 0; font-size: 0.65rem; color: var(--gray); text-transform: uppercase; }
        .stat-card p { margin: 8px 0 0; font-size: 1rem; font-weight: bold; }
        .balance-card { grid-column: 1 / -1; background: #e7f3ff; border-left-color: var(--green); }

        /* Pop-up Modals */
        .modal { display: none; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); margin-bottom: 20px; border-top: 6px solid var(--blue); }
        .field-group { margin-bottom: 15px; }
        .field-label { font-size: 0.7rem; font-weight: 800; color: var(--blue); text-transform: uppercase; margin-bottom: 6px; display: block; }
        input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; font-size: 1rem; background: #fafafa; outline: none; }
        input:focus { border-color: var(--blue); }

        /* Transaction List */
        .entry-item { background: white; padding: 15px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #ddd; }
        .entry-item.is-today { border-left-color: var(--gold); background: #fffdf5; }
        .tag-today { background: var(--gold); color: var(--dark); font-size: 0.5rem; padding: 2px 6px; border-radius: 4px; font-weight: 900; margin-left: 5px; vertical-align: middle; }
        
        .action-btns { display: flex; gap: 10px; }
        .btn-circle { border: none; background: #f0f2f5; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        
        .secondary-actions { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-sec { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #ddd; background: white; font-weight: bold; cursor: pointer; font-size: 0.8rem; }

        .loading-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; justify-content:center; align-items:center; color:white; }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay"><b>⏳ SYNCING...</b></div>

<div id="loginPage">
    <div class="login-card">
        <h1 style="margin:0; letter-spacing:3px;">LA VIDA</h1>
        <p style="color:var(--gray); font-size:0.8rem; margin-bottom:30px;">Authorized Access Only</p>
        <input type="password" id="passInput" inputmode="numeric" placeholder="••••••" style="text-align:center; letter-spacing:10px; font-size:1.5rem;">
        <button class="primary-cta" style="margin-top:20px;" onclick="checkLogin()">UNLOCK SYSTEM</button>
    </div>
</div>

<div id="mainApp">
    <div class="header">
        <h1>LA VIDA</h1>
        <div class="today-panel">
            <div class="today-stat"><h4>Today Sales</h4><p id="daySales">0</p></div>
            <div class="today-stat"><h4>Today Net</h4><p id="dayNet" style="color:var(--green)">0</p></div>
        </div>
    </div>

    <div class="container">
        <button class="primary-cta" onclick="openForm('new')">
            <span>➕</span> ADD DAILY ENTRY
        </button>

        <div class="summary-grid">
            <div class="stat-card"><h4>Stock Value</h4><p id="totalStock">...</p></div>
            <div class="stat-card"><h4>Expenses</h4><p id="totalOther">...</p></div>
            <div class="stat-card"><h4>Savings</h4><p id="totalSavings">...</p></div>
            <div class="stat-card balance-card"><h4>Current Cash Balance</h4><p id="balance" style="font-size:1.2rem;">...</p></div>
        </div>

        <div class="secondary-actions">
            <button class="btn-sec" onclick="openForm('search')">🔍 FIND DATE</button>
            <button class="btn-sec" onclick="openForm('report')">📄 REPORTS</button>
        </div>

        <div id="entryModal" class="modal">
            <h3 id="formTitle" style="margin-top:0;">New Record</h3>
            <div class="field-group"><span class="field-label">Date</span><input type="date" id="date"></div>
            <div class="field-group"><span class="field-label">Sales (TZS)</span><input type="number" id="sales" placeholder="0"></div>
            <div class="field-group"><span class="field-label">Stocking</span><input type="number" id="stock" placeholder="0"></div>
            <div class="field-group"><span class="field-label">Other Exp</span><input type="number" id="other" placeholder="0"></div>
            <div class="field-group"><span class="field-label">Savings</span><input type="number" id="savings" placeholder="0"></div>
            <button class="primary-cta" onclick="saveRecord()">SAVE DATA</button>
            <button class="btn-sec" style="width:100%; border:none;" onclick="closeModals()">CANCEL</button>
        </div>

        <div id="searchModal" class="modal">
            <span class="field-label">Go to Specific Date</span>
            <input type="date" id="searchDate" style="margin-bottom:15px;">
            <button class="primary-cta" onclick="executeSearch()">SEARCH</button>
            <button class="btn-sec" style="width:100%; border:none;" onclick="closeModals()">CLOSE</button>
        </div>

        <div id="reportModal" class="modal">
            <span class="field-label">Generate PDF Report</span>
            <input type="month" id="reportMonth" style="margin-bottom:15px;">
            <button class="primary-cta" onclick="generatePDF()">DOWNLOAD PDF</button>
            <button class="btn-sec" style="width:100%; border:none;" onclick="closeModals()">CLOSE</button>
        </div>

        <label style="font-size:0.7rem; font-weight:bold; color:var(--gray); text-transform:uppercase; display:block; margin-bottom:10px;">Transaction History</label>
        <div id="entryList"></div>
        <button id="loadMoreBtn" class="btn-sec" style="width:100%; margin-top:10px; display:none;" onclick="loadMore()">VIEW MORE</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzDqLcc9kqXA8sH1cfdZ17asFXBXfZ8mwVpXXiPeZV-uesUw_KlIfquwZJsx2Q7pq00/exec";
let data = [];
let displayLimit = 5;

// Password Login on Enter
document.getElementById('passInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') checkLogin(); });

function checkLogin() {
    if (document.getElementById('passInput').value === "112511") {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        fetchData();
    } else { alert("Wrong Passcode"); }
}

function openForm(type) {
    closeModals();
    if(type === 'new') {
        document.getElementById('formTitle').innerText = "New Record";
        document.querySelectorAll('#entryModal input').forEach(i => i.value = '');
        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('entryModal').style.display = 'block';
    } else if(type === 'search') {
        document.getElementById('searchModal').style.display = 'block';
    } else if(type === 'report') {
        document.getElementById('reportModal').style.display = 'block';
    }
}

function closeModals() {
    document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
}

async function fetchData() {
    document.getElementById('loadingOverlay').style.display = 'flex';
    try {
        const res = await fetch(SCRIPT_URL);
        data = await res.json();
        render();
    } catch (e) { alert("Data fetch failed."); }
    document.getElementById('loadingOverlay').style.display = 'none';
}

function render() {
    const list = document.getElementById('entryList');
    list.innerHTML = '';
    let totals = {s:0, st:0, o:0, sv:0}, dayS = 0, dayN = 0;
    const todayStr = new Date().toISOString().split('T')[0];

    data.sort((a,b) => new Date(a.date) - new Date(b.date));
    data.forEach(row => {
        totals.s += row.sales; totals.st += row.stocking; 
        totals.o += row.other; totals.sv += row.savings;
        if(row.date === todayStr) {
            dayS = row.sales;
            dayN = row.sales - row.stocking - row.other - row.savings;
        }
    });

    document.getElementById('daySales').innerText = dayS.toLocaleString();
    document.getElementById('dayNet').innerText = dayN.toLocaleString();
    document.getElementById('totalStock').innerText = totals.st.toLocaleString();
    document.getElementById('totalOther').innerText = totals.o.toLocaleString();
    document.getElementById('totalSavings').innerText = totals.sv.toLocaleString();
    document.getElementById('balance').innerText = (totals.s - totals.st - totals.o - totals.sv).toLocaleString() + " TZS";

    const visible = [...data].reverse().slice(0, displayLimit);
    visible.forEach(row => {
        const isToday = row.date === todayStr;
        list.innerHTML += `
            <div class="entry-item ${isToday ? 'is-today' : ''}">
                <div>
                    <b>${row.date}</b>${isToday ? '<span class="tag-today">TODAY</span>' : ''}<br>
                    <small style="color:var(--gray)">Sales: ${row.sales.toLocaleString()} | Exp: ${(row.stocking+row.other).toLocaleString()}</small>
                </div>
                <div class="action-btns">
                    <button class="btn-circle" onclick="editRow('${row.date}')">✏️</button>
                    <button class="btn-circle" style="color:var(--red)" onclick="deleteRow('${row.date}')">🗑️</button>
                </div>
            </div>`;
    });
    document.getElementById('loadMoreBtn').style.display = data.length > displayLimit ? 'block' : 'none';
}

function loadMore() { displayLimit += 5; render(); }

async function saveRecord() {
    const record = {
        date: document.getElementById('date').value,
        sales: parseFloat(document.getElementById('sales').value) || 0,
        stocking: parseFloat(document.getElementById('stock').value) || 0,
        other: parseFloat(document.getElementById('other').value) || 0,
        savings: parseFloat(document.getElementById('savings').value) || 0
    };
    if(!record.date) return alert("Select Date");
    document.getElementById('loadingOverlay').style.display = 'flex';
    await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(record) });
    closeModals();
    setTimeout(fetchData, 1200);
}

function editRow(date) {
    const found = data.find(d => d.date === date);
    if(found) {
        document.getElementById('date').value = date;
        document.getElementById('sales').value = found.sales;
        document.getElementById('stock').value = found.stocking;
        document.getElementById('other').value = found.other;
        document.getElementById('savings').value = found.savings;
        document.getElementById('formTitle').innerText = "Editing: " + date;
        document.getElementById('entryModal').style.display = 'block';
    }
}

function executeSearch() {
    const d = document.getElementById('searchDate').value;
    if(data.some(row => row.date === d)) {
        editRow(d);
        document.getElementById('searchModal').style.display = 'none';
    } else { alert("No record found."); }
}

async function deleteRow(d) {
    if(!confirm("Delete " + d + "?")) return;
    document.getElementById('loadingOverlay').style.display = 'flex';
    await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({action:"delete", date:d}) });
    setTimeout(fetchData, 1200);
}

function generatePDF() {
    const m = document.getElementById('reportMonth').value;
    const filtered = data.filter(d => d.date.startsWith(m));
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text("LA VIDA REPORT - " + m, 14, 20);
    const rows = filtered.map(d => [d.date, d.sales.toLocaleString(), d.stocking.toLocaleString(), d.other.toLocaleString(), d.savings.toLocaleString()]);
    doc.autoTable({ startY: 30, head: [['Date', 'Sales', 'Stock', 'Expenses', 'Savings']], body: rows });
    doc.save(`Report_${m}.pdf`);
}
</script>
</body>
</html>
