<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Vida Minimart</title>
    <style>
        :root { --blue: #004085; --dark: #001a33; --light: #f8fbff; --green: #28a745; --gray: #6c757d; --red: #dc3545; --gold: #d4af37; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; margin: 0; padding: 0; }
        
        .brand-header { background: var(--dark); color: white; padding: 30px 10px; text-align: center; border-bottom: 6px solid var(--blue); }
        .brand-header h1 { margin: 0; font-size: 2.2rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 900; }

        #loginPage { display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--dark); padding: 20px; }
        .login-card { background: white; width: 100%; max-width: 350px; padding: 40px 20px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        #mainApp { display: none; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        
        /* Stacked Summary Grid for Mobile */
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 12px; border-radius: 12px; border-left: 4px solid var(--blue); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stat-card h4 { margin: 0; font-size: 0.65rem; color: var(--gray); text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0; font-size: 1rem; font-weight: bold; color: var(--dark); }
        .full-width-card { grid-column: span 2; border-left-color: var(--green); background: #fafffa; }

        /* Report & AI Action Sections */
        .action-section { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; }
        .ai-section { border-color: var(--gold); }
        .report-section { border-color: var(--blue); }
        .btn-action { border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .ai-btn { background: var(--dark); color: var(--gold); border: 1px solid var(--gold); }
        .report-btn { background: var(--blue); color: white; }
        .ai-response { font-size: 0.85rem; color: #444; line-height: 1.4; white-space: pre-line; display: none; margin-top: 10px; padding: 10px; background: #fffdf5; border-radius: 8px; }

        /* Input Styles */
        .input-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        label { font-size: 0.7rem; font-weight: bold; color: var(--gray); text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; background: #fafafa; margin-top: 5px; margin-bottom: 10px; }
        .btn-save { width: 100%; background: var(--blue); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 1rem; cursor: pointer; }
        
        /* Entry List */
        .entry-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--blue); }
        .btn-delete { background: none; border: none; color: var(--red); font-size: 1.2rem; padding: 10px; cursor: pointer; opacity: 0.7; }

        .loading { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; justify-content:center; align-items:center; }
    </style>
</head>
<body>

<div id="loading" class="loading"><b>🔄 Connecting to La Vida Cloud...</b></div>

<div id="loginPage">
    <div class="login-card">
        <h1 style="color:var(--dark); margin:0;">LA VIDA</h1>
        <p style="color:var(--gray); font-size: 0.8rem; margin-bottom: 25px;">Management System</p>
        <input type="password" id="passInput" placeholder="Passcode" style="text-align:center; letter-spacing: 5px;">
        <button class="btn-save" onclick="checkLogin()" style="margin-top:10px;">UNLOCK</button>
    </div>
</div>

<div id="mainApp">
    <div class="brand-header"><h1>La Vida Minimart</h1></div>

    <div class="container">
        <div class="summary-grid">
            <div class="stat-card"><h4>Sales</h4><p id="totalSales">0</p></div>
            <div class="stat-card"><h4>Stock</h4><p id="totalStock">0</p></div>
            <div class="stat-card"><h4>Other</h4><p id="totalOther">0</p></div>
            <div class="stat-card"><h4>Savings</h4><p id="totalSavings">0</p></div>
            <div class="stat-card full-width-card"><h4>Net Balance</h4><p id="balance">0</p></div>
        </div>

        <div class="action-section report-section">
            <label>📅 PDF Report Generator</label>
            <input type="month" id="reportMonth">
            <button class="btn-action report-btn" onclick="generatePDF()">📥 DOWNLOAD PDF REPORT</button>
        </div>

        <div class="action-section ai-section">
            <button class="btn-action ai-btn" onclick="generateInsights()">✨ GET AI BUSINESS INSIGHTS</button>
            <div id="aiResponse" class="ai-response"></div>
        </div>

        <div class="input-card">
            <label>🔍 Go to Date / Edit Record</label>
            <div style="display:flex; gap:10px; margin-top:5px;">
                <input type="date" id="searchDate" style="margin:0;">
                <button onclick="searchByDate()" style="background:var(--blue); color:white; border:none; padding:0 15px; border-radius:10px;">🔍</button>
            </div>
        </div>

        <div class="input-card">
            <label>📝 Daily Record Entry</label>
            <input type="date" id="date">
            <input type="number" id="sales" placeholder="Sales Amount">
            <input type="number" id="stock" placeholder="Stocking/Supplies">
            <input type="number" id="other" placeholder="Other Expenses">
            <input type="number" id="savings" placeholder="Savings">
            <button class="btn-save" onclick="addRecord()">SAVE RECORD</button>
        </div>

        <label style="margin-left: 5px; margin-bottom: 10px; display: block;">📑 Recent History</label>
        <div id="entryList"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzDqLcc9kqXA8sH1cfdZ17asFXBXfZ8mwVpXXiPeZV-uesUw_KlIfquwZJsx2Q7pq00/exec";
let data = [];

window.onload = () => { if (sessionStorage.getItem('la_vida_session') === 'active') showApp(); };

function checkLogin() {
    if (document.getElementById('passInput').value === "112511") {
        sessionStorage.setItem('la_vida_session', 'active');
        showApp();
    } else { alert("Incorrect Passcode"); }
}

function showApp() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    fetchFromCloud();
}

async function fetchFromCloud() {
    document.getElementById('loading').style.display = 'flex';
    try {
        const res = await fetch(SCRIPT_URL);
        data = await res.json();
        render();
    } catch (e) { console.error("Fetch Error", e); }
    document.getElementById('loading').style.display = 'none';
}

function render() {
    const list = document.getElementById('entryList');
    list.innerHTML = '';
    let runBal = 0, totals = {s:0, st:0, o:0, sv:0};
    
    data.sort((a,b) => new Date(a.date) - new Date(b.date));

    data.forEach((row) => {
        runBal += (row.sales - row.stocking - row.other - row.savings);
        totals.s += row.sales; totals.st += row.stocking; totals.o += row.other; totals.sv += row.savings;

        list.innerHTML = `
            <div class="entry-item">
                <div style="flex-grow:1">
                    <b>${row.date}</b><br>
                    <small>S: ${row.sales.toLocaleString()} | Bal: ${runBal.toLocaleString()}</small>
                </div>
                <button class="btn-delete" onclick="deleteEntry('${row.date}')">🗑️</button>
            </div>
        ` + list.innerHTML;
    });

    document.getElementById('totalSales').innerText = totals.s.toLocaleString();
    document.getElementById('totalStock').innerText = totals.st.toLocaleString();
    document.getElementById('totalOther').innerText = totals.o.toLocaleString();
    document.getElementById('totalSavings').innerText = totals.sv.toLocaleString();
    document.getElementById('balance').innerText = runBal.toLocaleString();
}

async function addRecord() {
    const record = {
        date: document.getElementById('date').value,
        sales: parseFloat(document.getElementById('sales').value) || 0,
        stocking: parseFloat(document.getElementById('stock').value) || 0,
        other: parseFloat(document.getElementById('other').value) || 0,
        savings: parseFloat(document.getElementById('savings').value) || 0
    };
    if (!record.date) return alert("Select a date.");
    document.getElementById('loading').style.display = 'flex';
    try {
        await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(record) });
        setTimeout(fetchFromCloud, 1000);
        document.querySelectorAll('.input-card input:not([type="date"])').forEach(i => i.value = '');
    } catch (e) { alert("Save Error"); }
}

async function deleteEntry(dateToDelete) {
    if(!confirm("Archive record for " + dateToDelete + "?")) return;
    document.getElementById('loading').style.display = 'flex';
    try {
        await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({action: "delete", date: dateToDelete}) });
        setTimeout(fetchFromCloud, 1000);
    } catch (e) { alert("Delete Error"); }
}

function searchByDate() {
    const sDate = document.getElementById('searchDate').value;
    const found = data.find(item => item.date === sDate);
    if (found) {
        document.getElementById('date').value = sDate;
        document.getElementById('sales').value = found.sales;
        document.getElementById('stock').value = found.stocking;
        document.getElementById('other').value = found.other;
        document.getElementById('savings').value = found.savings;
    } else { alert("No record for this date."); }
}

function generateInsights() {
    const aiBox = document.getElementById('aiResponse');
    aiBox.style.display = 'block';
    if (data.length === 0) { aiBox.innerText = "Need more data."; return; }
    
    let tSales = 0, tStock = 0;
    data.forEach(d => { tSales += d.sales; tStock += d.stocking; });
    const stockRatio = (tStock / tSales) * 100;
    
    aiBox.innerText = `📊 AI ANALYSIS\n• Avg Daily Sales: ${(tSales/data.length).toFixed(0)}\n• Stocking Ratio: ${stockRatio.toFixed(0)}%\n• ${stockRatio > 55 ? "⚠️ Warning: Stocking costs are high." : "✅ Margin health is good."}`;
}

function generatePDF() {
    const monthVal = document.getElementById('reportMonth').value;
    if (!monthVal) return alert("Select a month.");
    const filtered = data.filter(d => d.date.startsWith(monthVal));
    if (filtered.length === 0) return alert("No data found.");

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text("La Vida Minimart - Report: " + monthVal, 14, 20);
    const tableData = filtered.map(d => [d.date, d.sales, d.stocking, d.other, d.savings]);
    doc.autoTable({ startY: 30, head: [['Date', 'Sales', 'Stock', 'Other', 'Savings']], body: tableData });
    doc.save(`LaVida_${monthVal}.pdf`);
}
</script>
</body>
</html>
