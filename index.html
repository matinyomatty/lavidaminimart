<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Vida Control Pro</title>
    <style>
        :root { --blue: #004085; --dark: #001a33; --light: #f4f7f9; --green: #28a745; --gray: #6c757d; --red: #dc3545; --gold: #d4af37; }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--light); margin: 0; padding: 0; color: var(--dark); }
        
        /* Sticky Hero Header */
        .header { 
            background: var(--dark); 
            color: white; 
            padding: 15px; 
            border-bottom: 5px solid var(--blue);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .header h1 { margin: 0; font-size: 1.2rem; letter-spacing: 2px; color: var(--gold); text-align: center; }
        
        .today-panel { 
            background: rgba(255,255,255,0.05); 
            margin-top: 10px; 
            padding: 12px; 
            border-radius: 12px; 
            display: flex; 
            justify-content: space-between; 
            border: 1px solid rgba(212,175,55,0.2); 
        }
        .today-stat h4 { margin: 0; font-size: 0.55rem; color: var(--gold); text-transform: uppercase; letter-spacing: 0.5px; }
        .today-stat p { margin: 4px 0 0; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; gap: 4px; }
        
        .trend-badge { font-size: 0.6rem; padding: 2px 5px; border-radius: 4px; font-weight: 800; display: none; }
        .trend-up { background: rgba(40, 167, 69, 0.2); color: #4ade80; display: inline-block; }
        .trend-down { background: rgba(220, 53, 69, 0.2); color: #f87171; display: inline-block; }

        #loginPage { display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--dark); padding: 20px; }
        .login-card { background: white; width: 100%; max-width: 340px; padding: 40px 25px; border-radius: 24px; text-align: center; }
        #mainApp { display: none; }
        .container { padding: 15px; max-width: 480px; margin: auto; }
        .primary-cta { background: var(--blue); color: white; width: 100%; padding: 18px; border: none; border-radius: 16px; font-size: 1.1rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,64,133,0.3); transition: 0.2s; }
        
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 16px; border-left: 4px solid var(--blue); box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .stat-card h4 { margin: 0; font-size: 0.6rem; color: var(--gray); text-transform: uppercase; }
        .stat-card p { margin: 6px 0 0; font-size: 0.8rem; font-weight: bold; }

        .modal { display: none; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); margin-bottom: 20px; border-top: 6px solid var(--blue); position: fixed; top: 10%; left: 5%; width: 90%; z-index: 2000; }
        .entry-item { background: white; padding: 15px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #ddd; }
        .entry-item.is-today { border-left-color: var(--gold); background: #fffdf5; }
        .loading-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; justify-content:center; align-items:center; color:white; }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay"><b>⏳ SYNCING LA VIDA...</b></div>

<div id="loginPage">
    <div class="login-card">
        <h1 style="margin:0; letter-spacing:3px;">LA VIDA</h1>
        <p style="color:var(--gray); font-size:0.8rem; margin-bottom:30px;">Security Verification</p>
        <input type="password" id="passInput" inputmode="numeric" placeholder="••••••" style="text-align:center; letter-spacing:10px; font-size:1.5rem;">
        <button class="primary-cta" style="margin-top:20px;" onclick="checkLogin()">UNLOCK</button>
    </div>
</div>

<div id="mainApp">
    <div class="header">
        <h1>LA VIDA</h1>
        <div class="today-panel">
            <div class="today-stat">
                <h4>Today Sales</h4>
                <p><span id="daySales">0 TZS</span> <span id="salesTrend" class="trend-badge"></span></p>
            </div>
            <div class="today-stat" style="text-align: right;">
                <h4>Net Balance</h4>
                <p><span id="balTrend" class="trend-badge"></span> <span id="topBalance" style="color:var(--gold)">0 TZS</span></p>
            </div>
        </div>
    </div>

    <div class="container">
        <button class="primary-cta" onclick="openForm('new')" style="margin-top:10px;"><span>➕</span> ADD DAILY ENTRY</button>
        <div class="summary-grid">
            <div class="stat-card"><h4>Stock Value</h4><p id="totalStock">...</p></div>
            <div class="stat-card"><h4>Other Exp</h4><p id="totalOther">...</p></div>
            <div class="stat-card"><h4>Total Sales</h4><p id="totalSales">...</p></div>
            <div class="stat-card"><h4>Savings</h4><p id="totalSavings">...</p></div>
        </div>
        <div id="entryList"></div>
        <button id="loadMoreBtn" class="btn-sec" style="width:100%; margin-top:10px; display:none; padding:12px; border-radius:12px; border:1px solid #ddd; background:white; font-weight:bold;" onclick="loadMore()">VIEW MORE</button>
    </div>

    <div id="entryModal" class="modal">
        <h3 id="formTitle" style="margin:0 0 15px 0;">Daily Entry</h3>
        <input type="date" id="date" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid #ddd;">
        <input type="number" id="sales" placeholder="Sales (TZS)" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid #ddd;">
        <input type="number" id="stock" placeholder="Stocking Cost" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid #ddd;">
        <input type="number" id="other" placeholder="Other Expenses" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid #ddd;">
        <input type="number" id="savings" placeholder="Savings" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid #ddd;">
        <textarea id="note" placeholder="Notes..." style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid #ddd; height:60px;"></textarea>
        <button class="primary-cta" onclick="saveRecord()">SAVE DATA</button>
        <button onclick="closeModals()" style="width:100%; background:none; border:none; color:var(--gray); font-weight:bold; cursor:pointer;">CANCEL</button>
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzDqLcc9kqXA8sH1cfdZ17asFXBXfZ8mwVpXXiPeZV-uesUw_KlIfquwZJsx2Q7pq00/exec";
let data = [];
let displayLimit = 5;

const getLocDate = (d = new Date()) => d.toLocaleDateString('sv-SE');

function checkLogin() {
    if (document.getElementById('passInput').value === "112511") {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        fetchData();
    } else { alert("Access Denied"); }
}

async function fetchData() {
    document.getElementById('loadingOverlay').style.display = 'flex';
    try {
        const res = await fetch(SCRIPT_URL);
        data = await res.json();
        render();
    } catch (e) { console.error(e); }
    document.getElementById('loadingOverlay').style.display = 'none';
}

function render() {
    const list = document.getElementById('entryList');
    list.innerHTML = '';
    let totalS = 0, totalSt = 0, totalO = 0, totalSv = 0;
    let daySales = 0, yesterdaySales = 0;
    let currentBal = 0, yesterdayBalTotal = 0;

    const todayStr = getLocDate();
    const yestDate = new Date(); yestDate.setDate(yestDate.getDate() - 1);
    const yesterdayStr = getLocDate(yestDate);

    data.sort((a,b) => new Date(a.date) - new Date(b.date));
    
    data.forEach(row => {
        const rowDate = row.date.split('T')[0];
        const net = row.sales - row.stocking - row.other - row.savings;
        currentBal += net;
        totalS += row.sales; totalSt += row.stocking; 
        totalO += row.other; totalSv += row.savings;

        if(rowDate === todayStr) daySales = row.sales;
        if(rowDate === yesterdayStr) {
            yesterdaySales = row.sales;
            yesterdayBalTotal = currentBal; // Capture balance as it was at end of yesterday
        }
    });

    // Update Main Numbers
    document.getElementById('daySales').innerText = daySales.toLocaleString() + " TZS";
    document.getElementById('topBalance').innerText = currentBal.toLocaleString() + " TZS";
    document.getElementById('totalSales').innerText = totalS.toLocaleString() + " TZS";
    document.getElementById('totalStock').innerText = totalSt.toLocaleString() + " TZS";
    document.getElementById('totalOther').innerText = totalO.toLocaleString() + " TZS";
    document.getElementById('totalSavings').innerText = totalSv.toLocaleString() + " TZS";

    // Strictly show trends ONLY if Today and Yesterday records exist
    const sBadge = document.getElementById('salesTrend');
    const bBadge = document.getElementById('balTrend');
    
    const hasToday = data.some(d => d.date.split('T')[0] === todayStr);
    const hasYesterday = data.some(d => d.date.split('T')[0] === yesterdayStr);

    if(hasToday && hasYesterday) {
        // Sales Trend
        const sDiff = ((daySales - yesterdaySales) / (yesterdaySales || 1)) * 100;
        sBadge.innerText = (sDiff >= 0 ? "↑ " : "↓ ") + Math.abs(sDiff).toFixed(0) + "%";
        sBadge.className = "trend-badge " + (sDiff >= 0 ? "trend-up" : "trend-down");
        
        // Balance Trend (Current total vs yesterday's total)
        const bDiff = ((currentBal - yesterdayBalTotal) / (Math.abs(yesterdayBalTotal) || 1)) * 100;
        bBadge.innerText = (bDiff >= 0 ? "↑ " : "↓ ") + Math.abs(bDiff).toFixed(0) + "%";
        bBadge.className = "trend-badge " + (bDiff >= 0 ? "trend-up" : "trend-down");
    } else {
        sBadge.className = "trend-badge";
        bBadge.className = "trend-badge";
    }

    const visible = [...data].reverse().slice(0, displayLimit);
    visible.forEach(row => {
        const d = row.date.split('T')[0];
        list.innerHTML += `
            <div class="entry-item ${d === todayStr ? 'is-today' : ''}">
                <div><b>${d}</b><br><small>Sales: ${row.sales.toLocaleString()} TZS</small></div>
                <button class="btn-circle" onclick="editRow('${d}')">✏️</button>
            </div>`;
    });
    document.getElementById('loadMoreBtn').style.display = data.length > displayLimit ? 'block' : 'none';
}

function openForm(type) {
    if(type === 'new') {
        document.getElementById('formTitle').innerText = "New Record";
        document.querySelectorAll('#entryModal input, #entryModal textarea').forEach(i => i.value = '');
        document.getElementById('date').value = getLocDate();
        document.getElementById('entryModal').style.display = 'block';
    }
}
function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
function loadMore() { displayLimit += 5; render(); }

async function saveRecord() {
    const record = {
        date: document.getElementById('date').value,
        sales: parseFloat(document.getElementById('sales').value) || 0,
        stocking: parseFloat(document.getElementById('stock').value) || 0,
        other: parseFloat(document.getElementById('other').value) || 0,
        savings: parseFloat(document.getElementById('savings').value) || 0,
        note: document.getElementById('note').value || ""
    };
    document.getElementById('loadingOverlay').style.display = 'flex';
    await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(record) });
    closeModals();
    setTimeout(fetchData, 1200);
}

function editRow(date) {
    const found = data.find(d => d.date.split('T')[0] === date);
    if(found) {
        document.getElementById('date').value = date;
        document.getElementById('sales').value = found.sales;
        document.getElementById('stock').value = found.stocking;
        document.getElementById('other').value = found.other;
        document.getElementById('savings').value = found.savings;
        document.getElementById('note').value = found.note || "";
        document.getElementById('entryModal').style.display = 'block';
    }
}
</script>
</body>
</html>
