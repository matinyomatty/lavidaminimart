<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Vida Minimart - Cloud Tracker</title>
    <style>
        :root { --blue: #0056b3; --dark: #002b5c; --light: #f8fbff; --green: #28a745; --gray: #6c757d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 0; }
        
        /* Login Screen */
        #loginPage { display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--dark); padding: 20px; }
        .login-card { background: white; width: 100%; max-width: 350px; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        
        /* Main App */
        #mainApp { display: none; padding-bottom: 30px; }
        .header { background: white; text-align: center; border-bottom: 1px solid #ddd; padding: 10px; }
        .header img { width: 100%; max-width: 350px; height: auto; border-radius: 10px; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        
        /* Summary Dashboard */
        .summary-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 5px 0 15px; scrollbar-width: none; }
        .stat-card { min-width: 130px; background: white; padding: 12px; border-radius: 12px; border-bottom: 4px solid var(--blue); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stat-card h4 { margin: 0; font-size: 0.65rem; color: var(--gray); text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0; font-size: 1rem; font-weight: bold; color: var(--dark); }
        .stat-card.balance { border-bottom-color: var(--green); }

        /* Form Styling */
        .section-label { font-size: 0.9rem; font-weight: bold; color: var(--dark); margin: 20px 0 10px; display: block; }
        .input-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .form-row { margin-bottom: 12px; }
        label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 4px; color: var(--gray); }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; background: #fafafa; }
        .btn-add { width: 100%; background: var(--blue); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 1rem; margin-top: 10px; cursor: pointer; }
        
        /* Search Box */
        .search-box { background: var(--light); border: 1px solid #cfe2ff; margin-bottom: 15px; }

        /* Log History */
        .entry-item { background: white; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--blue); }
        .entry-amt { text-align: right; font-weight: bold; font-size: 0.9rem; }

        .loading-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:1000; justify-content:center; align-items:center; font-weight:bold; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">Syncing with Cloud...</div>

<div id="loginPage">
    <div class="login-card">
        <h2 style="color:var(--dark)">La Vida Login</h2>
        <input type="password" id="passInput" placeholder="Passcode" style="text-align:center; letter-spacing: 5px;">
        <button class="btn-add" onclick="checkLogin()">ENTER</button>
    </div>
</div>

<div id="mainApp">
    <div class="header"><img src="LA VIDA MINIMART 3.jpg" alt="La Vida Banner"></div>
    <div class="container">
        
        <div class="summary-scroll">
            <div class="stat-card"><h4>Sales</h4><p id="totalSales">0</p></div>
            <div class="stat-card"><h4>Stock</h4><p id="totalStock">0</p></div>
            <div class="stat-card"><h4>Other</h4><p id="totalOther">0</p></div>
            <div class="stat-card"><h4>Savings</h4><p id="totalSavings">0</p></div>
            <div class="stat-card balance"><h4>Balance</h4><p id="balance">0</p></div>
        </div>

        <span class="section-label">🔍 REVIEW OR EDIT RECORD</span>
        <div class="input-card search-box">
            <label>Go to Date</label>
            <input type="date" id="searchDate" onchange="searchByDate()">
            <div id="searchMsg" style="font-size: 0.75rem; margin-top: 5px; color: var(--blue);">Select a date to see historical data</div>
        </div>

        <span class="section-label">📝 DAILY ENTRY</span>
        <div class="input-card">
            <div class="form-row"><label>Date</label><input type="date" id="date"></div>
            <div class="form-row"><label>Sales</label><input type="number" id="sales"></div>
            <div class="form-row"><label>Stocking</label><input type="number" id="stock"></div>
            <div class="form-row"><label>Other</label><input type="number" id="other"></div>
            <div class="form-row"><label>Savings</label><input type="number" id="savings"></div>
            <button class="btn-add" onclick="addRecord()">SAVE RECORD</button>
        </div>

        <span class="section-label">📑 RECENT LOGS</span>
        <div id="entryList"></div>
    </div>
</div>

<script>
// UPDATED SCRIPT URL
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxujGHSVSPCM6UyobjgdJ30-6Jj5NbMPsd3-gPZVCszszXavQwoELpCGcLHnH4bK6G6/exec";
let data = [];
let logoutTimer;

// Inactivity Logout logic (5 mins)
function resetTimer() { clearTimeout(logoutTimer); logoutTimer = setTimeout(() => { location.reload(); }, 300000); }
['mousemove', 'mousedown', 'touchstart', 'keydown'].forEach(e => window.addEventListener(e, resetTimer));

function checkLogin() {
    if (document.getElementById('passInput').value === "112511") {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        fetchFromCloud();
    } else { alert("Incorrect Passcode"); }
}

async function fetchFromCloud() {
    document.getElementById('loading').style.display = 'flex';
    try {
        const response = await fetch(SCRIPT_URL);
        data = await response.json();
        render();
    } catch (e) { console.log("Cloud sync failed"); }
    document.getElementById('loading').style.display = 'none';
}

function searchByDate() {
    const sDate = document.getElementById('searchDate').value;
    // Find entry in local data fetched from cloud
    const found = data.find(item => {
        let entryDate = new Date(item.date).toISOString().split('T')[0];
        return entryDate === sDate;
    });
    
    if (found) {
        document.getElementById('date').value = sDate;
        document.getElementById('sales').value = found.sales;
        document.getElementById('stock').value = found.stocking;
        document.getElementById('other').value = found.other;
        document.getElementById('savings').value = found.savings;
        document.getElementById('searchMsg').innerText = "✅ Found entry. You can update it now.";
    } else {
        document.getElementById('searchMsg').innerText = "❓ No entry for this date. Creating new entry.";
        document.getElementById('date').value = sDate;
        document.querySelectorAll('.input-card input:not([type="date"])').forEach(i => i.value = '');
    }
}

async function addRecord() {
    const record = {
        date: document.getElementById('date').value,
        sales: parseFloat(document.getElementById('sales').value) || 0,
        stocking: parseFloat(document.getElementById('stock').value) || 0,
        other: parseFloat(document.getElementById('other').value) || 0,
        savings: parseFloat(document.getElementById('savings').value) || 0
    };

    if (!record.date) return alert("Select Date");
    document.getElementById('loading').style.display = 'flex';
    
    try {
        await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(record) });
        await fetchFromCloud(); 
        document.getElementById('searchMsg').innerText = "Select a date to see historical data";
        document.querySelectorAll('input:not([type="date"])').forEach(i => i.value = '');
    } catch (e) { alert("Error saving data"); }
    document.getElementById('loading').style.display = 'none';
}

function render() {
    const list = document.getElementById('entryList');
    list.innerHTML = '';
    let runBal = 0, totals = {s:0, st:0, o:0, sv:0};

    // Sort data by date ascending for balance calculation
    data.sort((a, b) => new Date(a.date) - new Date(b.date));

    data.forEach((row) => {
        const itemBal = (row.sales - row.stocking - row.other - row.savings);
        runBal += itemBal;
        totals.s += row.sales; totals.st += row.stocking; totals.o += row.other; totals.sv += row.savings;

        // Add to list (newest at top)
        list.innerHTML = `
            <div class="entry-item">
                <div>
                    <div style="font-weight:bold; font-size:0.9rem">${new Date(row.date).toLocaleDateString()}</div>
                    <span style="font-size:0.75rem; color:var(--gray)">Sales: ${row.sales.toLocaleString()}</span>
                </div>
                <div class="entry-amt">
                    Bal: ${runBal.toLocaleString()}
                </div>
            </div>
        ` + list.innerHTML;
    });

    document.getElementById('totalSales').innerText = totals.s.toLocaleString();
    document.getElementById('totalStock').innerText = totals.st.toLocaleString();
    document.getElementById('totalOther').innerText = totals.o.toLocaleString();
    document.getElementById('totalSavings').innerText = totals.sv.toLocaleString();
    document.getElementById('balance').innerText = runBal.toLocaleString();
}
</script>
</body>
</html>
